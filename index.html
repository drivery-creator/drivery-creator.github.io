<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivery OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00d2ff; --green: #39ff14; --purple: #7b2cbf; --glass: rgba(6, 11, 20, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Rajdhani', sans-serif; color: #fff; }
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; }
        #ui-layer { position: relative; z-index: 100; height: 100dvh; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        #ui-layer > * { pointer-events: auto; }
        
        header { padding: 20px 30px; background: linear-gradient(to bottom, #000, transparent); display: flex; justify-content: space-between; }
        .logo-main { height: 50px; filter: drop-shadow(0 0 10px var(--blue)); }
        
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .orb-master { width: 280px; height: 280px; cursor: pointer; touch-action: none; filter: drop-shadow(0 0 30px var(--blue)); }
        .search-title { font-family: 'Orbitron'; font-size: 18px; color: var(--blue); letter-spacing: 2px; text-align: center; }

        #auth-vault { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--blue); border-radius: 25px; padding: 30px; z-index: 2000; text-align: center; }
        .vault-input { width: 100%; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--blue); border-radius: 10px; color: #fff; box-sizing: border-box; outline: none; }
        
        .legal-box { margin: 15px 0; padding: 10px; background: rgba(0,210,255,0.05); border-radius: 10px; font-size: 9px; color: #8a8d91; text-align: justify; }
        .btn-purple { width: 100%; padding: 15px; border-radius: 10px; background: var(--purple); color: #fff; border: none; font-family: 'Orbitron'; font-size: 10px; cursor: not-allowed; opacity: 0.3; transition: 0.3s; }

        .ticket-ui { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--glass); border: 1px solid var(--blue); padding: 20px; border-radius: 20px; text-align: center; min-width: 200px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { bottom: 50px; opacity: 0; } to { bottom: 120px; opacity: 1; } }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="ui-layer">
        <header>
            <img src="logo_app.png" class="logo-main">
            <div style="text-align:right; font-family:'Orbitron'; font-size:10px; color:#8a8d91;">CORE: <span style="color:var(--green)">ACTIVE</span></div>
        </header>
        <main>
            <div id="main-orbe" class="orb-master"></div>
            <h2 class="search-title" id="orb-status">SISTEMA LISTO</h2>
        </main>
        <div style="height: 100px;"></div>
    </div>

    <div id="auth-vault">
        <div style="font-family:'Orbitron'; font-size:10px; color:var(--blue); margin-bottom:20px;">VINCULACIÓN DE NÚCLEO</div>
        <input id="y-id" class="vault-input" type="text" placeholder="Correo / Teléfono">
        <input id="y-pass" class="vault-input" type="password" placeholder="Contraseña">
        
        <div class="legal-box">
            Drivery OS actúa como asistente técnico de accesibilidad. Al vincular, usted acepta el enlace con servicios de terceros bajo su propia responsabilidad.
            <label style="display:flex; align-items:center; gap:8px; margin-top:10px; cursor:pointer;">
                <input type="checkbox" id="legal-check" onchange="toggleBtn()">
                <span style="color:var(--blue); font-weight:bold;">ACEPTO TÉRMINOS</span>
            </label>
        </div>
        <button class="btn-purple" id="sync-btn" onclick="sincronizar()" disabled>INICIAR VINCULACIÓN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const GOOGLE_MAPS_KEY = "AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME";
        const API_URL = "https://drivery-backend.onrender.com";
        let map, sphere, core, coreMat, recognition, isRecording = false, userLocation = { lat: 10.48, lng: -66.90 };

        function toggleBtn() {
            const check = document.getElementById('legal-check');
            const btn = document.getElementById('sync-btn');
            btn.disabled = !check.checked;
            btn.style.opacity = check.checked ? "1" : "0.3";
            btn.style.cursor = check.checked ? "pointer" : "not-allowed";
        }

        function initMap() {
            const style = [{"elementType":"geometry","stylers":[{"color":"#000000"}]},{"featureType":"road","elementType":"geometry","stylers":[{"color":"#121212"}]},{"elementType":"labels.text.fill","stylers":[{"color":"#00d2ff"}]}];
            map = new google.maps.Map(document.getElementById("map"), { center: userLocation, zoom: 15, styles: style, disableDefaultUI: true });
            
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    userLocation = { lat: p.coords.latitude, lng: p.coords.longitude };
                    map.setCenter(userLocation);
                    new google.maps.Marker({ position: userLocation, map: map, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 7, fillColor: "#00d2ff", fillOpacity: 1, strokeWeight: 2, strokeColor: "#fff" } });
                }, null, { enableHighAccuracy: true });
            }
            initThreeJS(); initVoice();
            const saved = localStorage.getItem('drv_session');
            if(saved) document.getElementById('orb-status').innerText = `HOLA, ${JSON.parse(saved).nombre.toUpperCase()}`;
        }

        function initThreeJS() {
            const container = document.getElementById('main-orbe');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(280, 280); container.appendChild(renderer.domElement);

            sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(1.1, 5), new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.1 }));
            coreMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.6 });
            core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 3), coreMat);
            sphere.add(core); scene.add(sphere); camera.position.z = 2.4;

            const anim = () => { requestAnimationFrame(anim); sphere.rotation.y += 0.003; core.rotation.y -= 0.006; renderer.render(scene, camera); };
            anim();

            container.addEventListener('pointerdown', () => { isRecording = true; coreMat.color.setHex(0xffffff); try { recognition.start(); } catch(e){} });
            window.addEventListener('pointerup', () => { if(isRecording){ isRecording = false; coreMat.color.setHex(0x00d2ff); recognition.stop(); } });
        }

        function initVoice() {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-VE';
            recognition.onresult = (e) => ejecutar(e.results[0][0].transcript);
        }

        async function sincronizar() {
            const id = document.getElementById('y-id').value, pass = document.getElementById('y-pass').value;
            try {
                const res = await fetch(`${API_URL}/api/register-identity`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id, password: pass, deviceId: 'DRV-MASTER' })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('drv_session', JSON.stringify({ session: data.session, nombre: data.nombre }));
                    document.getElementById('auth-vault').style.display = 'none';
                    hablar(`Hola ${data.nombre}, núcleo sincronizado.`);
                }
            } catch(e) { hablar("Error de enlace."); }
        }

        async function ejecutar(cmd) {
            const session = localStorage.getItem('drv_session');
            if(!session) { document.getElementById('auth-vault').style.display = 'block'; return; }
            coreMat.color.setHex(0x7b2cbf);
            try {
                const res = await fetch(`${API_URL}/api/command`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ command: cmd, userCoords: userLocation, session: JSON.parse(session).session })
                });
                const data = await res.json();
                if(data.coords) map.panTo(data.coords);
                mostrarTicket(data.display); hablar(data.reply);
            } catch(e) { hablar("Reintente en un momento."); }
            finally { coreMat.color.setHex(0x00d2ff); }
        }

        function mostrarTicket(d) {
            const t = document.createElement('div'); t.className = 'ticket-ui';
            t.innerHTML = `<small style="color:var(--green)">BCV: ${d.tasa}</small><h3>$${d.usd}</h3><p>${d.bs} Bs</p><small>${d.tiempo} MIN</small>`;
            document.body.appendChild(t); setTimeout(() => t.remove(), 10000);
        }

        function hablar(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

        window.onload = () => {
            const s = document.createElement('script'); s.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_KEY}&callback=initMap`;
            s.async = true; document.head.appendChild(s);
        };
    </script>
</body>
</html>
