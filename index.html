<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivery OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00d2ff; --green: #39ff14; --glass: rgba(6, 11, 20, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
        
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        #ui-layer > * { pointer-events: auto; }

        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .profile-box { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 30px; border: 1px solid rgba(0,210,255,0.2); cursor: pointer; }
        .u-wallet { color: var(--green); font-family: 'Orbitron'; font-size: 14px; font-weight: 900; }

        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #orbe-canvas { width: 250px; height: 250px; cursor: pointer; filter: drop-shadow(0 0 30px rgba(0,210,255,0.3)); }
        
        #fleet-panel { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); width: 200px; display: none; flex-direction: column; gap: 12px; }
        .car-card { background: var(--glass); border: 1px solid var(--blue); border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px #000; }
        
        #payment-selector { position: absolute; bottom: 30px; left: 30px; background: var(--glass); padding: 10px; border-radius: 12px; border: 1px solid var(--blue); display: flex; gap: 10px; }
        .pay-btn { padding: 8px 15px; border-radius: 8px; font-size: 11px; color: #fff; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .pay-btn.active { border-color: var(--blue); background: rgba(0,210,255,0.2); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="ui-layer">
        <header>
            <img src="logo_app.png" style="height: 45px;">
            <div class="profile-box">
                <div style="text-align:right">
                    <div id="u-name" style="font-size:10px; color:#fff; font-family:'Orbitron';">PILOTO</div>
                    <div class="u-wallet" id="u-balance">$45.00</div>
                </div>
                <div style="width:35px; height:35px; border-radius:50%; border:2px solid var(--blue); background:#111;"></div>
            </div>
        </header>

        <main>
            <div id="orbe-canvas"></div>
            <div id="status" style="font-family:'Orbitron'; font-size:11px; color:var(--blue); margin-top:15px;">PRESIONAR PARA COMANDAR</div>
        </main>

        <div id="fleet-panel"></div>

        <div id="payment-selector">
            <div class="pay-btn active" id="p-cash" onclick="setPay('cash')">EFECTIVO</div>
            <div class="pay-btn" id="p-wallet" onclick="setPay('wallet')">WALLET AI</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const API_URL = "https://drivery-backend.onrender.com";
        const MAP_KEY = "AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME";
        let map, directionsRenderer, directionsService, recognition, coreMat;
        let userPos, lastDest, currentPay = 'cash';

        function initMap() {
            const style = [{"elementType":"geometry","stylers":[{"color":"#0f1113"}]},{"elementType":"labels.text.fill","stylers":[{"color":"#00d2ff"}]},{"featureType":"road","elementType":"geometry","stylers":[{"color":"#1a1d21"}]},{"featureType":"water","elementType":"geometry","stylers":[{"color":"#05070a"}]}];
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ polylineOptions: { strokeColor: "#00d2ff", strokeWeight: 6 } });
            
            navigator.geolocation.getCurrentPosition(p => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                map = new google.maps.Map(document.getElementById("map"), { center: userPos, zoom: 15, styles: style, disableDefaultUI: true });
                directionsRenderer.setMap(map);
            });
            initThree(); initVoice();
        }

        async function runCommand(cmd) {
            const session = JSON.parse(localStorage.getItem('drv_session')).session;
            coreMat.color.setHex(0xffffff);
            try {
                const res = await fetch(`${API_URL}/api/command`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ command: cmd, userCoords: userPos, session })
                });
                const data = await res.json();
                lastDest = data.destCoords;
                
                // Pintar Ruta
                directionsService.route({ origin: userPos, destination: lastDest, travelMode: 'DRIVING' }, (r, s) => {
                    if (s === 'OK') directionsRenderer.setDirections(r);
                });

                // Mostrar Flota
                const panel = document.getElementById('fleet-panel');
                panel.innerHTML = ''; panel.style.display = 'flex';
                data.display.fleet.forEach(car => {
                    const div = document.createElement('div');
                    div.className = 'car-card';
                    div.onclick = () => bookTrip(car.id, car.usd);
                    div.innerHTML = `<div style="font-size:9px; color:var(--blue);">${car.name}</div><div style="font-size:20px; font-weight:900; color:#fff;">$${car.usd}</div><div style="font-size:10px; color:#8a8d91;">ETA: ${car.arrival}</div>`;
                    panel.appendChild(div);
                });
                speak(data.reply);
            } catch(e) { speak("Error de conexión."); }
            finally { coreMat.color.setHex(0x00d2ff); }
        }

        async function bookTrip(id, price) {
            const session = JSON.parse(localStorage.getItem('drv_session')).session;
            speak("Confirmando solicitud.");
            const res = await fetch(`${API_URL}/api/book`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ serviceId: id, pickup: userPos, destination: lastDest, paymentMode: currentPay, session, price })
            });
            const data = await res.json();
            if(data.success) {
                speak(data.reply);
                document.getElementById('fleet-panel').style.display = 'none';
            }
        }

        function setPay(m) { currentPay = m; document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active')); document.getElementById(`p-${m}`).classList.add('active'); }
        function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
        
        function initThree() {
            const scene = new THREE.Scene(); const cam = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const ren = new THREE.WebGLRenderer({ alpha: true, antialias: true }); ren.setSize(250, 250);
            document.getElementById('orbe-canvas').appendChild(ren.domElement);
            coreMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true });
            const sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(1, 4), coreMat);
            scene.add(sphere); cam.position.z = 2;
            const anim = () => { requestAnimationFrame(anim); sphere.rotation.y += 0.01; ren.render(scene, cam); }; anim();
            document.getElementById('orbe-canvas').onmousedown = () => { recognition.start(); coreMat.color.setHex(0xffffff); };
            window.onmouseup = () => { recognition.stop(); coreMat.color.setHex(0x00d2ff); };
        }

        function initVoice() {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-VE';
            recognition.onresult = (e) => runCommand(e.results[0][0].transcript);
        }

        window.onload = () => {
            const s = document.createElement('script');
            s.src = `https://maps.googleapis.com/maps/api/js?key=${MAP_KEY}&callback=initMap`;
            document.head.appendChild(s);
        };
    </script>
</body>
</html>
