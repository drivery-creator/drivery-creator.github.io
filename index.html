<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivery OS | Command Center Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --drivery-blue: #00d2ff;
            --drivery-green: #39ff14;
            --glass-bg: rgba(6, 11, 20, 0.85);
            --glass-border: rgba(0, 210, 255, 0.3);
            --font-tech: 'Orbitron', sans-serif;
            --font-main: 'Rajdhani', sans-serif;
        }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: var(--font-main); color: #fff; }
        
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; background-color: #0a0a0a; }

        .orb-aura {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vh; height: 80vh; max-width: 600px; max-height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.18) 0%, rgba(0, 210, 255, 0.05) 45%, transparent 75%);
            z-index: 4; pointer-events: none; border-radius: 50%;
            animation: aura-pulse 4s infinite ease-in-out;
        }

        @keyframes aura-pulse {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        #ui-layer { position: relative; z-index: 100; height: 100dvh; display: flex; flex-direction: column; pointer-events: none; justify-content: space-between; }
        #ui-layer > * { pointer-events: auto; }
        
        header { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 30px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .brand-box { display: flex; align-items: center; gap: 8px; }
        .logo-main { height: 60px; filter: drop-shadow(0 0 15px var(--drivery-blue)); }
        .os-badge { font-family: var(--font-tech); font-size: 10px; color: var(--drivery-blue); border: 1px solid var(--drivery-blue); padding: 1px 4px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; }
        
        .header-stats { text-align: right; font-family: var(--font-tech); }
        .stat-line { font-size: 10px; letter-spacing: 1px; color: #8a8d91; margin: 2px 0; font-weight: 700; }
        .status-on { color: var(--drivery-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        .total-highlight { color: var(--drivery-blue); font-size: 14px; font-weight: 900; }
        
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px; }
        .orb-master { width: 300px; height: 300px; position: relative; display: flex; justify-content: center; align-items: center; z-index: 10; filter: drop-shadow(0 0 45px rgba(0, 210, 255, 0.5)); }
        
        .search-title { font-size: 24px; font-weight: 700; letter-spacing: 2px; margin-bottom: 15px; text-shadow: 0 2px 10px rgba(0,0,0,1); text-align: center; }
        .search-container { width: 100%; max-width: 450px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 50px; padding: 12px 25px; display: flex; align-items: center; gap: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .search-container input { background: transparent; border: none; outline: none; color: #fff; font-size: 18px; width: 100%; font-family: var(--font-main); }
        .mic-icon { font-size: 24px; color: var(--drivery-blue); cursor: pointer; transition: 0.3s; }
        .mic-icon:active { transform: scale(0.85); color: var(--drivery-green); }
        
        .ticket-ui {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--drivery-blue);
            padding: 20px; border-radius: 20px; z-index: 1000; text-align: center; min-width: 220px;
            box-shadow: 0 0 30px rgba(0,210,255,0.3); animation: ticket-slide 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: opacity 0.5s;
        }
        .ticket-ui h3 { font-family: var(--font-tech); font-size: 28px; margin: 0; color: #fff; }
        .ticket-ui p { color: var(--drivery-green); font-weight: 700; margin: 5px 0; font-size: 18px; }
        .ticket-ui small { letter-spacing: 1px; opacity: 0.7; font-size: 10px; text-transform: uppercase; }

        @keyframes ticket-slide { from { bottom: 50px; opacity: 0; } to { bottom: 120px; opacity: 1; } }

        #fleet-commander { width: fit-content; margin: 0 auto 30px 30px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.9); }
        .fleet-entry { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .fleet-number { font-family: var(--font-tech); font-size: 18px; font-weight: 900; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="orb-aura"></div>

    <div id="ui-layer">
        <header>
            <div class="brand-box">
                <img src="logo_app.png" alt="DRIVERY" class="logo-main">
                <div class="os-badge">OS</div>
            </div>
            <div class="header-stats">
                <p class="stat-line">CORE INTELIGENTE DE SERVICIOS</p>
                <p class="stat-line">CARACAS | VZLA</p>
                <p class="stat-line">STATUS: <span class="status-on">●</span> - <span class="total-highlight" id="total-count">48,170</span></p>
            </div>
        </header>

        <main>
            <div id="main-orbe" class="orb-master"></div>
            <h2 class="search-title">¿A dónde vamos hoy?</h2>
            <div class="search-container">
                <input id="drivery-input" type="text" placeholder="Destino...">
                <div class="mic-icon" id="mic-btn">🎤</div>
            </div>
        </main>

        <div id="fleet-commander">
            <div class="fleet-entry">
                <div style="width:8px;height:8px;border-radius:50%;background:var(--drivery-blue);box-shadow:0 0 10px var(--drivery-blue);"></div>
                <div><div style="color:var(--drivery-blue);font-weight:700;font-size:12px;">FLOTA BLUE:</div><div class="fleet-number" id="blue-count">28,450</div></div>
            </div>
            <div class="fleet-entry">
                <div style="width:8px;height:8px;border-radius:50%;background:var(--drivery-green);box-shadow:0 0 10px var(--drivery-green);"></div>
                <div><div style="color:var(--drivery-green);font-weight:700;font-size:12px;">FLOTA GREEN:</div><div class="fleet-number" id="green-count">19,720</div></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let map, sphere, core, coreMat;
        const API_URL = "https://drivery-backend.onrender.com";

        function initMap() {
            const tacticalStyle = [
                { "elementType": "geometry", "stylers": [{ "color": "#000000" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#121212" }] },
                { "featureType": "road.highway", "elementType": "geometry.fill", "stylers": [{ "color": "#004d4d" }] },
                { "featureType": "road.highway", "elementType": "geometry.stroke", "stylers": [{ "color": "#00d2ff" }, { "weight": 0.5 }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#00d2ff" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "visibility": "off" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#001a1a" }] }
            ];

            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 10.4806, lng: -66.8983 },
                zoom: 15,
                styles: tacticalStyle,
                disableDefaultUI: true
            });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    map.panTo(userPos);
                    new google.maps.Marker({ position: userPos, map: map, title: "Tú" });
                });
            }
            initThreeJS();
            initVoice();
        }

        function initThreeJS() {
            const container = document.getElementById('main-orbe');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.IcosahedronGeometry(1.1, 5);
            const material = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.15 });
            sphere = new THREE.Mesh(geometry, material);
            
            coreMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.6 });
            core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 3), coreMat);
            
            sphere.add(core);
            scene.add(sphere);
            camera.position.z = 2.4;

            function animate() {
                requestAnimationFrame(animate);
                sphere.rotation.y += 0.003;
                core.rotation.y -= 0.006;
                renderer.render(scene, camera);
            }
            animate();
        }

        function initVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-VE';

            document.getElementById('mic-btn').onclick = () => {
                recognition.start();
                document.getElementById('drivery-input').placeholder = "ESCUCHANDO...";
            };

            recognition.onresult = (e) => {
                const cmd = e.results[0][0].transcript;
                document.getElementById('drivery-input').value = cmd;
                ejecutarComando(cmd);
            };
        }

        async function ejecutarComando(cmd) {
            coreMat.color.setHex(0xffffff);
            coreMat.opacity = 1;

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                
                try {
                    const res = await fetch(`${API_URL}/api/command`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            command: cmd, 
                            userCoords: currentCoords 
                        })
                    });
                    const data = await res.json();
                    
                    if(data.coords) { map.panTo(data.coords); map.setZoom(16); }
                    if(data.display) mostrarTicket(data.display);
                    hablar(data.reply);
                } catch (e) {
                    hablar("Error de conexión con el núcleo.");
                } finally {
                    coreMat.color.setHex(0x00d2ff);
                    coreMat.opacity = 0.6;
                    document.getElementById('drivery-input').placeholder = "Destino...";
                }
            }, (err) => {
                hablar("Activa el GPS para poder cotizar.");
                coreMat.color.setHex(0x00d2ff);
            }, { enableHighAccuracy: true });
        }

        function mostrarTicket(d) {
            const t = document.createElement('div');
            t.className = 'ticket-ui';
            t.innerHTML = `<small>LOGÍSTICA CONFIRMADA</small><h3>$${d.usd}</h3><p>${d.bs} Bs</p><small>LLEGADA: ${d.tiempo} MIN</small>`;
            document.body.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 500);
            }, 8000);
        }

        function hablar(texto) {
            const ut = new SpeechSynthesisUtterance(texto);
            ut.lang = 'es-VE';
            window.speechSynthesis.speak(ut);
        }

        setInterval(() => {
            const blue = 28450 + Math.floor(Math.random() * 20);
            const green = 19720 + Math.floor(Math.random() * 20);
            document.getElementById('blue-count').innerText = blue.toLocaleString();
            document.getElementById('green-count').innerText = green.toLocaleString();
            document.getElementById('total-count').innerText = (blue + green).toLocaleString();
        }, 3000);
    </script>
    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME&callback=initMap"></script>
</body>
</html>
