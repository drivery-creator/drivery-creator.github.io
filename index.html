<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivery OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* CONFIGURACIÓN DEL SET */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #010203; overflow: hidden; 
            font-family: 'Inter', sans-serif; 
        }

        #map { 
            height: 100vh; width: 100%; 
            position: absolute; top: 0; left: 0; z-index: 1; 
        }

        /* DISEÑO DEL PANEL DE MANDO (SIDEBAR) */
        #sidebar {
            position: absolute; top: 20px; left: 20px;
            width: 340px; z-index: 100;
            background: rgba(10, 15, 23, 0.85);
            backdrop-filter: blur(25px); /* Efecto Hollywood */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            color: white;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        /* BRANDING */
        .logo-container { text-align: center; margin-bottom: 30px; }
        .drivery-logo { 
            font-family: 'Orbitron', sans-serif;
            font-size: 32px; font-weight: 900; letter-spacing: 8px; 
            color: #fff; text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
            margin: 0;
        }
        .rif-tag { 
            font-size: 10px; color: #5a5f66; margin-top: 8px; 
            letter-spacing: 3px; font-weight: 700;
        }

        .divider { 
            height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); 
            margin: 25px 0; 
        }

        /* TARJETAS DE DATOS */
        .stat-card { margin-bottom: 25px; transition: all 0.3s ease; }
        .stat-label { 
            font-size: 10px; color: #8a8d91; letter-spacing: 2px; 
            margin-bottom: 6px; font-weight: 700;
        }
        .stat-value { font-size: 28px; font-weight: 900; font-family: 'Orbitron', sans-serif; }

        #os-status { 
            color: #39ff14; font-size: 14px; 
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.4); 
            display: flex; align-items: center; gap: 8px;
        }
        #os-status::before {
            content: ''; width: 8px; height: 8px; background: #39ff14; 
            border-radius: 50%; display: inline-block; animation: pulse 2s infinite;
        }

        .blue-fleet .stat-value { color: #00d2ff; }
        .green-fleet .stat-value { color: #39ff14; }

        .total-bar {
            background: rgba(0, 210, 255, 0.08);
            padding: 20px; border-radius: 12px; text-align: center;
            border: 1px solid rgba(0, 210, 255, 0.2);
            margin-top: 10px;
        }
        .total-label { font-size: 9px; color: #00d2ff; letter-spacing: 2px; font-weight: 900; }
        .total-value { font-size: 32px; color: #fff; font-weight: 900; margin-top: 5px; }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo-container">
            <h1 class="drivery-logo">DRIVERY</h1>
            <div class="rif-tag">RIF: J-50478174-5</div>
        </div>

        <div class="divider"></div>

        <div class="stat-card">
            <div class="stat-label">SISTEMA OPERATIVO</div>
            <div class="stat-value" id="os-status">TOTALMENTE OPERATIVO</div>
        </div>

        <div class="stat-card blue-fleet">
            <div class="stat-label">FLOTA BLUE (PASAJEROS)</div>
            <div class="stat-value" id="blue-count">28,450</div>
        </div>

        <div class="stat-card green-fleet">
            <div class="stat-label">FLOTA GREEN (LOGÍSTICA)</div>
            <div class="stat-value" id="green-count">19,720</div>
        </div>

        <div class="total-bar">
            <div class="total-label">TOTAL UNIDADES MUNDIALES</div>
            <div class="total-value" id="total-count">48,170</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        function initMap() {
            // Estética de noche táctica para el mapa
            const darkStyle = [
                { "elementType": "geometry", "stylers": [{ "color": "#1d1f21" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#8ec3b9" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "color": "#1d1f21" }] },
                { "featureType": "administrative", "elementType": "geometry.stroke", "stylers": [{ "color": "#4b4e52" }] },
                { "featureType": "landscape", "stylers": [{ "color": "#111214" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#282a2e" }] },
                { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#1d1f21" }] },
                { "featureType": "water", "stylers": [{ "color": "#000000" }] }
            ];

            const mapOptions = {
                center: { lat: 10.4806, lng: -66.8983 },
                zoom: 13,
                styles: darkStyle,
                disableDefaultUI: true,
                backgroundColor: "#05070a"
            };

            const map = new google.maps.Map(document.getElementById("map"), mapOptions);

            console.log("✅ Escenario Drivery OS cargado: Caracas HQ.");
        }
    </script>

    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME&callback=initMap"></script>

</body>
</html>
