<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drivery - Inicio</title>

    <style>
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        @media (min-width: 1024px) { body, html, button { cursor: none !important; } }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; touch-action: none; 
            color: white;
        }

        /* 💡 LUCES DE ESTADIO FONDO 💡 */
        .estadio-luces {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 15% 15%, rgba(50, 188, 129, 0.15) 0%, rgba(0,0,0,0) 60%),
                radial-gradient(circle at 85% 15%, rgba(50, 188, 129, 0.15) 0%, rgba(0,0,0,0) 60%),
                radial-gradient(circle at 15% 85%, rgba(50, 188, 129, 0.15) 0%, rgba(0,0,0,0) 60%),
                radial-gradient(circle at 85% 85%, rgba(50, 188, 129, 0.15) 0%, rgba(0,0,0,0) 60%);
            z-index: 1; pointer-events: none;
        }

        /* ⚾ PELOTA 3D ANIMADA ⚾ */
        #ball-container { position: fixed; width: 32px; height: 32px; pointer-events: none; z-index: 10000; left: 0; top: 0; }
        #ball-cursor {
            width: 100%; height: 100%; background-color: #fff; border-radius: 50%; border: 1.5px solid #ccc;
            overflow: hidden; position: relative; box-shadow: 0 0 15px rgba(255,255,255,0.4);
            animation: rotateBall 8s linear infinite;
        }
        #ball-cursor::before, #ball-cursor::after { content: ""; position: absolute; width: 100%; height: 100%; border: 2px dashed red; border-radius: 50%; }
        #ball-cursor::before { left: -70%; } #ball-cursor::after { right: -70%; }
        #ball-shadow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; box-shadow: inset -6px -6px 12px rgba(0,0,0,0.6); z-index: 2; }

        @keyframes rotateBall { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* CONTENEDOR DE TARJETAS */
        #main-wrapper { 
            position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px; width: 100%;
        }

        .card {
            background: #111; padding: 35px 25px; border-radius: 35px; border: 1px solid #222;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8); max-width: 360px; width: 100%;
            display: none; animation: slideUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-align: center;
        }
        .active { display: block; }

        #logo-app { width: 85px; height: 85px; margin-bottom: 20px; border-radius: 20px; border: 2px solid #32BC81; }
        h2 { font-size: 22px; margin: 0 0 25px 0; font-weight: 800; }

        /* BOTONES DE SELECCIÓN */
        .btn-choice {
            background: #1a1a1a; color: white; border: 1px solid #333; padding: 22px;
            width: 100%; border-radius: 20px; margin-bottom: 15px; font-size: 16px; font-weight: bold;
            display: flex; align-items: center; justify-content: space-between; cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-choice:active { transform: scale(0.98); background: #222; }
        .btn-choice i { font-style: normal; font-size: 20px; }

        /* FORMULARIO Y PASOS */
        .paso { margin-bottom: 18px; display: flex; align-items: flex-start; text-align: left; font-size: 14px; color: #bbb; }
        .paso-numero { background: #32BC81; color: #000; font-weight: bold; border-radius: 50%; min-width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 12px; }
        
        input, select {
            width: 100%; background: #000 !important; border: 1px solid #333; color: white !important;
            padding: 16px; border-radius: 14px; margin-bottom: 12px; font-size: 15px;
            -webkit-appearance: none;
        }
        input:focus { border-color: #32BC81; }

        .btn-primary { 
            background-color: #32BC81; color: #fff; padding: 18px; border-radius: 16px; 
            font-weight: bold; font-size: 16px; border: none; width: 100%; margin-top: 10px;
            box-shadow: 0 8px 20px rgba(50, 188, 129, 0.2); cursor: pointer;
        }
        .btn-primary:disabled { background-color: #222; color: #555; cursor: not-allowed; }

        .btn-back { background: none; border: none; color: #555; font-size: 13px; margin-top: 20px; cursor: pointer; text-decoration: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #mensaje-exito { display: none; font-size: 26px; color: #32BC81; font-weight: 900; text-transform: uppercase; }
        .fade-out { opacity: 0; transition: 0.8s; }
    </style>
</head>
<body>

    <div class="estadio-luces"></div>

    <div id="ball-container">
        <div id="ball-cursor"></div>
        <div id="ball-shadow"></div>
    </div>

    <div id="main-wrapper">
        <div id="screen-choice" class="card active">
            <img src="logo-app.png" alt="Logo" id="logo-app">
            <h2>Bienvenido a Drivery</h2>
            <button class="btn-choice" onclick="showScreen('screen-user')">
                Soy Usuario <i>👤</i>
            </button>
            <button class="btn-choice" onclick="showScreen('screen-driver')">
                Soy Conductor <i>🚗</i>
            </button>
        </div>

        <div id="screen-user" class="card">
            <h2>Pasos de Registro</h2>
            <div class="paso">
                <div class="paso-numero">1</div>
                <div>Pulsa <b>Agregar número</b>, coloca el código y sube tu foto.</div>
            </div>
            <div class="paso">
                <div class="paso-numero">2</div>
                <div><b>Agrega a inicio</b> y ancla la app en tu móvil.</div>
            </div>
            <button class="btn-primary" onclick="mostrarMensajeFinal()">ENTENDIDO</button>
            <button class="btn-back" onclick="showScreen('screen-choice')">Volver atrás</button>
        </div>

        <div id="screen-driver" class="card">
            <h2>Datos de Conductor</h2>
            <form id="form-conductor">
                <input type="text" name="Nombre" placeholder="Nombre y Apellido" required>
                <input type="tel" name="Telefono" placeholder="Número de contacto" required>
                <select name="Vehiculo" required>
                    <option value="" disabled selected>Tipo de vehículo</option>
                    <option value="Sedan">Carro Sedán</option>
                    <option value="SUV">Camioneta / SUV</option>
                    <option value="Moto">Motocicleta</option>
                    <option value="Otro">Otro</option>
                </select>
                <button type="submit" id="btn-envio" class="btn-primary">ENVIAR SOLICITUD</button>
            </form>
            <button class="btn-back" onclick="showScreen('screen-choice')">Volver atrás</button>
        </div>

        <div id="mensaje-exito">¡A JUGAR EN<br>LAS GRANDES LIGAS!</div>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // CONTROL DE LA PELOTA
        const ballContainer = document.getElementById('ball-container');
        let posX = window.innerWidth / 2, posY = window.innerHeight / 2;
        let velX = 2.5, velY = 2.5, isUserControlled = false;

        function animate() {
            if (!isUserControlled) {
                posX += velX; posY += velY;
                if (posX + 32 >= window.innerWidth || posX <= 0) velX *= -1;
                if (posY + 32 >= window.innerHeight || posY <= 0) velY *= -1;
                ballContainer.style.transform = `translate(${posX}px, ${posY}px)`;
            }
            requestAnimationFrame(animate);
        }
        animate();

        function handleInput(x, y) {
            isUserControlled = true;
            ballContainer.style.transform = `translate(${x - 16}px, ${y - 16}px)`;
        }
        document.addEventListener('mousemove', (e) => handleInput(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => handleInput(e.touches[0].clientX, e.touches[0].clientY), { passive: false });

        // ENVÍO PRIVADO CON FORMSPREE
        const form = document.getElementById('form-conductor');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-envio');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const formData = new FormData(this);

            try {
                const response = await fetch("https://formspree.io/f/xgolblvj", {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    mostrarMensajeFinal();
                } else {
                    alert("Error al enviar. Inténtalo de nuevo.");
                    btn.innerText = "ENVIAR SOLICITUD";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Sin conexión.");
                btn.innerText = "ENVIAR SOLICITUD";
                btn.disabled = false;
            }
        });

        function mostrarMensajeFinal() {
            document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
            document.getElementById('mensaje-exito').style.display = 'block';
            setTimeout(() => {
                document.getElementById('main-wrapper').classList.add('fade-out');
                setTimeout(() => { 
                    window.location.href = "https://15147507-4.ondelight.app"; 
                }, 800);
            }, 2500);
        }
    </script>
</body>
</html>
