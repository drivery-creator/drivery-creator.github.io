<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivery OS | Command Center Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --drivery-blue: #00d2ff; --drivery-green: #39ff14; --drivery-purple: #7b2cbf;
            --glass-bg: rgba(6, 11, 20, 0.85); --glass-border: rgba(0, 210, 255, 0.3);
            --font-tech: 'Orbitron', sans-serif; --font-main: 'Rajdhani', sans-serif;
        }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: var(--font-main); color: #fff; }
        
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; background-color: #0a0a0a; }

        /* ELIMINAR CUALQUIER REBORDE DINÁMICO DE GOOGLE */
        .gm-style div, .gm-style span, .gm-style label, .gm-style a { text-shadow: none !important; outline: none !important; }

        .orb-aura {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vh; height: 80vh; max-width: 600px; max-height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.18) 0%, rgba(0, 210, 255, 0.05) 45%, transparent 75%);
            z-index: 4; pointer-events: none; border-radius: 50%; animation: aura-pulse 4s infinite ease-in-out;
        }

        @keyframes aura-pulse { 0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } }

        #ui-layer { position: relative; z-index: 100; height: 100dvh; display: flex; flex-direction: column; pointer-events: none; justify-content: space-between; }
        #ui-layer > * { pointer-events: auto; }
        
        header { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 30px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .logo-main { height: 60px; filter: drop-shadow(0 0 15px var(--drivery-blue)); }

        .profile-box { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 5px 15px; background: rgba(255,255,255,0.05); border-radius: 30px; border: 1px solid var(--glass-border); }
        .u-wallet { color: var(--drivery-green); font-family: var(--font-tech); font-size: 14px; font-weight: 900; }

        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .orb-master { width: 300px; height: 300px; position: relative; z-index: 10; filter: drop-shadow(0 0 45px rgba(0, 210, 255, 0.5)); cursor: pointer; touch-action: none; }
        .search-title { font-size: 20px; font-weight: 700; letter-spacing: 2px; margin-top: 15px; text-shadow: 0 2px 10px #000; color: var(--drivery-blue); font-family: var(--font-tech); }

        #fleet-selection {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 195px; display: none; flex-direction: column; gap: 12px; z-index: 1000;
        }
        .car-card {
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 15px; animation: slideIn 0.4s ease-out; cursor: pointer;
        }
        .car-price { font-size: 20px; font-weight: 700; color: #fff; }

        #payment-overlay {
            position: absolute; bottom: 120px; left: 30px; background: var(--glass-bg); 
            padding: 12px; border-radius: 15px; border: 1px solid var(--drivery-blue);
            display: none; flex-direction: column; gap: 8px; z-index: 1001;
        }
        .method-btn { padding: 8px; font-size: 11px; color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; text-align: center; cursor: pointer; }
        .method-btn.active { border-color: var(--drivery-blue); background: rgba(0,210,255,0.1); }

        #fleet-commander { width: fit-content; margin: 0 auto 30px 30px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px 25px; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="orb-aura"></div>

    <div id="ui-layer">
        <header>
            <div class="brand-box"><img src="logo_app.png" alt="DRIVERY" class="logo-main"></div>
            <div class="profile-box">
                <div style="text-align:right">
                    <div id="u-name" style="font-size:10px; font-family:var(--font-tech); color:#fff;">OPERADOR</div>
                    <div class="u-wallet" id="u-balance">$0.00</div>
                </div>
                <div style="width:35px; height:35px; border-radius:50%; border:2px solid var(--drivery-blue); background:#111;"></div>
            </div>
        </header>

        <main>
            <div id="main-orbe" class="orb-master"></div>
            <h2 class="search-title" id="orb-status">MANTENER PARA TRANSMITIR</h2>
        </main>

        <div id="fleet-selection"></div>

        <div id="payment-overlay">
            <div style="font-size:9px; color:var(--drivery-blue); margin-bottom:5px; font-family:var(--font-tech);">MÉTODO DE PAGO</div>
            <div class="method-btn active" id="pay-cash" onclick="setPay('cash')">EFECTIVO</div>
            <div class="method-btn" id="pay-wallet" onclick="setPay('wallet')">DRIVERY WALLET</div>
        </div>

        <div id="fleet-commander">
            <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:8px;height:8px;border-radius:50%;background:var(--drivery-blue);box-shadow:0 0 10px var(--drivery-blue);"></div>
                <div><div style="color:var(--drivery-blue);font-weight:700;font-size:12px;">FLOTA BLUE:</div><div id="blue-count" style="font-family:var(--font-tech);font-size:18px;font-weight:900;">28,450</div></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const GOOGLE_MAPS_KEY = "AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME";
        const API_URL = "https://drivery-backend.onrender.com";
        let map, directionsRenderer, directionsService, sphere, coreMat, recognition, isRecording = false;
        let userPos = { lat: 10.48, lng: -66.90 }, lastDestCoords, currentMethod = 'cash';

        function initMap() {
            // CONFIGURACIÓN TÁCTICA SIN BORDES BLANCOS
            const tacticalStyle = [
                { "elementType": "geometry", "stylers": [{ "color": "#000000" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#00d2ff" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "visibility": "off" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#121212" }] },
                { "featureType": "road.highway", "elementType": "geometry.stroke", "stylers": [{ "color": "#00d2ff" }, { "weight": 0.5 }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#05070a" }] }
            ];

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ 
                map: null, suppressMarkers: false, 
                polylineOptions: { strokeColor: "#00d2ff", strokeWeight: 6, zIndex: 999 } 
            });
            
            map = new google.maps.Map(document.getElementById("map"), { center: userPos, zoom: 16, styles: tacticalStyle, disableDefaultUI: true });
            directionsRenderer.setMap(map);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    map.setCenter(userPos);
                });
            }
            initThreeJS(); initVoice();
            
            const session = JSON.parse(localStorage.getItem('drv_session'));
            if(session) {
                document.getElementById('u-name').innerText = session.nombre.toUpperCase();
                document.getElementById('orb-status').innerText = `LISTO, ${session.nombre.toUpperCase()}`;
            }
        }

        async function ejecutarComando(cmd) {
            const sessionRaw = localStorage.getItem('drv_session');
            if (!sessionRaw) return;
            const sessionData = JSON.parse(sessionRaw);
            
            coreMat.color.setHex(0x7b2cbf);
            try {
                const res = await fetch(`${API_URL}/api/command`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ command: cmd, userCoords: userPos, session: sessionData.session })
                });
                const data = await res.json();
                lastDestCoords = data.destCoords;

                // Espejar Ruta
                directionsService.route({ origin: userPos, destination: lastDestCoords, travelMode: 'DRIVING' }, (r, s) => {
                    if (s === 'OK') directionsRenderer.setDirections(r);
                });

                // Inyectar Flota
                const panel = document.getElementById('fleet-selection');
                panel.innerHTML = ''; panel.style.display = 'flex';
                document.getElementById('payment-overlay').style.display = 'flex';

                data.display.fleet.forEach(car => {
                    const card = document.createElement('div');
                    card.className = 'car-card';
                    card.onclick = () => confirmarViaje(car.id, car.usd);
                    card.innerHTML = `<div style="font-family:var(--font-tech);font-size:9px;color:var(--drivery-blue);">${car.name.toUpperCase()}</div><div class="car-price">$${car.usd}</div><div style="font-size:10px;color:#8a8d91;">LLEGADA: ${car.arrival}</div>`;
                    panel.appendChild(card);
                });
                hablar(data.reply);
            } catch(e) { hablar("Error de sincronización."); }
            finally { coreMat.color.setHex(0x00d2ff); }
        }

        async function confirmarViaje(id, precio) {
            const session = JSON.parse(localStorage.getItem('drv_session')).session;
            hablar("Ejecutando protocolo de reserva.");
            coreMat.color.setHex(0x7b2cbf);
            const res = await fetch(`${API_URL}/api/book`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ serviceId: id, pickup: userPos, destination: lastDestCoords, paymentMode: currentMethod, session, price: precio })
            });
            const data = await res.json();
            if (data.success) {
                hablar(data.reply);
                document.getElementById('fleet-selection').style.display = 'none';
                document.getElementById('payment-overlay').style.display = 'none';
            }
            coreMat.color.setHex(0x00d2ff);
        }

        function setPay(m) { currentMethod = m; document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active')); document.getElementById(`pay-${m}`).classList.add('active'); }
        function hablar(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

        function initThreeJS() {
            const container = document.getElementById('main-orbe');
            const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); renderer.setSize(300, 300);
            container.appendChild(renderer.domElement);
            sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(1.1, 5), new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.15 }));
            coreMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.6 });
            const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 3), coreMat);
            sphere.add(core); scene.add(sphere); camera.position.z = 2.4;
            const animate = () => { requestAnimationFrame(animate); sphere.rotation.y += 0.003; core.rotation.y -= 0.006; renderer.render(scene, camera); };
            animate();
            container.onmousedown = () => { isRecording = true; coreMat.color.setHex(0xffffff); try { recognition.start(); } catch(e) {} };
            window.onmouseup = () => { if (isRecording) { isRecording = false; recognition.stop(); coreMat.color.setHex(0x00d2ff); } };
        }

        function initVoice() { recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); recognition.lang = 'es-VE'; recognition.onresult = (e) => ejecutarComando(e.results[0][0].transcript); }

        window.onload = () => {
            const s = document.createElement('script');
            s.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_KEY}&callback=initMap`;
            document.head.appendChild(s);
            setInterval(() => { document.getElementById('blue-count').innerText = (28450 + Math.floor(Math.random()*20)).toLocaleString(); }, 3000);
        };
    </script>
</body>
</html>
