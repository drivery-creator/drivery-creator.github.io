<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivery OS | Command Center Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --drivery-blue: #00d2ff;
            --drivery-green: #39ff14;
            --glass-bg: rgba(6, 11, 20, 0.85);
            --glass-border: rgba(0, 210, 255, 0.3);
            --font-tech: 'Orbitron', sans-serif;
            --font-main: 'Rajdhani', sans-serif;
        }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: var(--font-main); color: #fff; }
        
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; background-color: #000; }

        .orb-aura {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vh; height: 80vh; max-width: 600px; max-height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.18) 0%, rgba(0, 210, 255, 0.05) 45%, transparent 75%);
            z-index: 4; pointer-events: none; border-radius: 50%;
            animation: aura-pulse 4s infinite ease-in-out;
        }

        @keyframes aura-pulse {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        #ui-layer { position: relative; z-index: 100; height: 100dvh; display: flex; flex-direction: column; pointer-events: none; justify-content: space-between; }
        #ui-layer > * { pointer-events: auto; }
        
        header { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 30px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .brand-box { display: flex; align-items: center; gap: 8px; }
        .logo-main { height: 60px; filter: drop-shadow(0 0 15px var(--drivery-blue)); }
        .os-badge { font-family: var(--font-tech); font-size: 10px; color: var(--drivery-blue); border: 1px solid var(--drivery-blue); padding: 1px 4px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; }
        
        .header-stats { text-align: right; font-family: var(--font-tech); }
        .stat-line { font-size: 10px; letter-spacing: 1px; color: #8a8d91; margin: 2px 0; font-weight: 700; }
        .status-on { color: var(--drivery-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        .total-highlight { color: var(--drivery-blue); font-size: 14px; font-weight: 900; }
        
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 20px; }
        .orb-master { width: 300px; height: 300px; position: relative; display: flex; justify-content: center; align-items: center; z-index: 10; filter: drop-shadow(0 0 45px rgba(0, 210, 255, 0.5)); }
        
        .search-title { font-size: 24px; font-weight: 700; letter-spacing: 2px; margin-bottom: 15px; text-shadow: 0 2px 10px rgba(0,0,0,1); text-align: center; }
        .search-container { width: 100%; max-width: 450px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 50px; padding: 12px 25px; display: flex; align-items: center; gap: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .search-container input { background: transparent; border: none; outline: none; color: #fff; font-size: 18px; width: 100%; font-family: var(--font-main); }
        .mic-icon { font-size: 24px; color: var(--drivery-blue); cursor: pointer; transition: 0.3s; }
        .mic-icon:active { transform: scale(0.8); color: var(--drivery-green); }
        
        #fleet-commander { width: fit-content; margin: 0 auto 30px 30px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.9); }
        .fleet-entry { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .fleet-number { font-family: var(--font-tech); font-size: 18px; font-weight: 900; }

        /* TICKET DINÁMICO */
        .ticket-ui {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--drivery-blue);
            padding: 20px; border-radius: 20px; z-index: 1000; text-align: center; min-width: 220px;
            box-shadow: 0 0 30px rgba(0,210,255,0.3); animation: ticket-slide 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes ticket-slide { from { bottom: 50px; opacity: 0; } to { bottom: 120px; opacity: 1; } }

        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            .logo-main { height: 45px; }
            .orb-master { width: 220px; height: 220px; }
            .search-title { font-size: 20px; }
            .search-container { padding: 10px 20px; }
            #fleet-commander { margin: 0 auto 20px auto; width: 80%; }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="orb-aura"></div>

    <div id="ui-layer">
        <header>
            <div class="brand-box">
                <img src="logo_app.png" alt="DRIVERY" class="logo-main">
                <div class="os-badge">OS</div>
            </div>
            <div class="header-stats">
                <p class="stat-line">UN ORBE, TODO TU MUNDO LOGÍSTICO.</p>
                <p class="stat-line">CARACAS | VZLA</p>
                <p class="stat-line">STATUS: <span class="status-on">●</span> - <span class="total-highlight" id="total-count">48,170</span></p>
            </div>
        </header>
        <main>
            <div id="main-orbe" class="orb-master"></div>
            <h2 class="search-title">¿A dónde vamos hoy?</h2>
            <div class="search-container">
                <input id="drivery-input" type="text" placeholder="Destino...">
                <div class="mic-icon" id="mic-btn">🎤</div>
            </div>
        </main>
        <div id="fleet-commander">
            <div class="fleet-entry">
                <div style="width:8px;height:8px;border-radius:50%;background:var(--drivery-blue);box-shadow:0 0 10px var(--drivery-blue);"></div>
                <div><div style="color:var(--drivery-blue);font-weight:700;font-size:12px;">FLOTA BLUE:</div><div class="fleet-number" id="blue-count">28,450</div></div>
            </div>
            <div class="fleet-entry">
                <div style="width:8px;height:8px;border-radius:50%;background:var(--drivery-green);box-shadow:0 0 10px var(--drivery-green);"></div>
                <div><div style="color:var(--drivery-green);font-weight:700;font-size:12px;">FLOTA GREEN:</div><div class="fleet-number" id="green-count">19,720</div></div>
            </div>
        </div>
