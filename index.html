<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivery OS | Command Center Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --drivery-blue: #00d2ff;
            --drivery-green: #39ff14;
            --drivery-purple: #7b2cbf;
            --glass-bg: rgba(6, 11, 20, 0.85);
            --glass-border: rgba(0, 210, 255, 0.3);
            --font-tech: 'Orbitron', sans-serif;
            --font-main: 'Rajdhani', sans-serif;
        }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: var(--font-main); color: #fff; }
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; filter: brightness(0.6); }
        .orb-aura { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80vh; height: 80vh; background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, transparent 75%); z-index: 4; pointer-events: none; }
        #ui-layer { position: relative; z-index: 100; height: 100dvh; display: flex; flex-direction: column; pointer-events: none; justify-content: space-between; }
        #ui-layer > * { pointer-events: auto; }
        header { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 30px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .logo-main { height: 60px; filter: drop-shadow(0 0 15px var(--drivery-blue)); }
        .header-stats { text-align: right; font-family: var(--font-tech); font-size: 10px; color: #8a8d91; }
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .orb-master { width: 300px; height: 300px; position: relative; z-index: 10; cursor: pointer; }
        .search-title { font-size: 20px; font-weight: 700; letter-spacing: 2px; margin-top: 15px; color: var(--drivery-blue); font-family: var(--font-tech); }
        #auth-vault { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 380px; background: var(--glass-bg); backdrop-filter: blur(50px); border: 1px solid var(--drivery-blue); border-radius: 30px; padding: 30px; z-index: 2000; text-align: center; }
        .vault-input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none; }
        .btn-purple { width: 100%; padding: 16px; border-radius: 12px; background: var(--drivery-purple); color: white; border: none; font-family: var(--font-tech); font-size: 11px; font-weight: 900; cursor: not-allowed; opacity: 0.3; }
        .ticket-ui { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--glass-bg); border: 1px solid var(--drivery-blue); padding: 20px; border-radius: 20px; z-index: 1000; text-align: center; min-width: 220px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="orb-aura"></div>
    <div id="ui-layer">
        <header>
            <div class="brand-box"><img src="logo_app.png" class="logo-main"></div>
            <div class="header-stats">CORE: <span style="color:var(--drivery-green)">ACTIVE</span><br>STATUS: <span id="total-count">48,170</span></div>
        </header>
        <main>
            <div id="main-orbe" class="orb-master"></div>
            <h2 class="search-title" id="orb-status">MANTENER PARA TRANSMITIR</h2>
        </main>
        <div id="fleet-commander" style="margin: 0 0 30px 30px; background: var(--glass-bg); padding: 15px; border-radius: 15px; width: fit-content;">
            <div style="color:var(--drivery-blue); font-weight:700;">FLOTA BLUE: <span id="blue-count">28,450</span></div>
            <div style="color:var(--drivery-green); font-weight:700;">FLOTA GREEN: <span id="green-count">19,720</span></div>
        </div>
    </div>

    <div id="auth-vault">
        <div style="font-family:var(--font-tech); color:var(--drivery-blue); font-size:11px; margin-bottom:20px;">ACCESO AL NÚCLEO</div>
        <input id="y-id" class="vault-input" type="text" placeholder="Correo / Teléfono">
        <input id="y-pass" class="vault-input" type="password" placeholder="Contraseña">
        <div style="padding:10px; background:rgba(0,210,255,0.05); font-size:9px; color:#8a8d91; margin:10px 0; border-radius:8px;">
            Al vincular, usted acepta a Drivery OS como asistente técnico de accesibilidad bajo su propia responsabilidad.
            <label style="display:flex; align-items:center; gap:8px; margin-top:8px; cursor:pointer;">
                <input type="checkbox" id="legal-check" onchange="toggleSyncBtn()"> <span style="color:var(--drivery-blue); font-weight:bold;">ACEPTO TÉRMINOS</span>
            </label>
        </div>
        <button class="btn-purple" id="sync-btn" onclick="sincronizar()" disabled>VINCULAR DISPOSITIVO</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const GOOGLE_MAPS_KEY = "AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME";
        const API_URL = "https://drivery-backend.onrender.com";
        let map, sphere, core, coreMat, recognition, isRecording = false, userLocation = { lat: 10.48, lng: -66.90 };

        function toggleSyncBtn() {
            const check = document.getElementById('legal-check');
            const btn = document.getElementById('sync-btn');
            btn.disabled = !check.checked;
            btn.style.opacity = check.checked ? "1" : "0.3";
            btn.style.cursor = check.checked ? "pointer" : "not-allowed";
        }

        function initMap() {
            const style = [{"elementType":"geometry","stylers":[{"color":"#000000"}]},{"featureType":"road","elementType":"geometry","stylers":[{"color":"#121212"}]},{"elementType":"labels.text.fill","stylers":[{"color":"#00d2ff"}]}];
            map = new google.maps.Map(document.getElementById("map"), { center: userLocation, zoom: 16, styles: style, disableDefaultUI: true });
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    map.setCenter(userLocation);
                });
            }
            initThreeJS(); initVoice();
            const saved = localStorage.getItem('drv_session');
            if(saved) document.getElementById('orb-status').innerText = `HOLA, ${JSON.parse(saved).nombre.toUpperCase()}`;
        }

        function initThreeJS() {
            const container = document.getElementById('main-orbe');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(300, 300); container.appendChild(renderer.domElement);
            sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(1.1, 5), new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.15 }));
            coreMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.6 });
            core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 3), coreMat);
            sphere.add(core); scene.add(sphere); camera.position.z = 2.4;
            const animate = () => { requestAnimationFrame(animate); sphere.rotation.y += 0.003; core.rotation.y -= 0.006; renderer.render(scene, camera); };
            animate();
            container.addEventListener('pointerdown', () => { isRecording = true; coreMat.color.setHex(0xffffff); try { recognition.start(); } catch(e){} });
            window.addEventListener('pointerup', () => { if(isRecording){ isRecording = false; coreMat.color.setHex(0x00d2ff); recognition.stop(); } });
        }

        function initVoice() {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-VE';
            recognition.onresult = (e) => ejecutarComando(e.results[0][0].transcript);
        }

        async function sincronizar() {
            const id = document.getElementById('y-id').value, pass = document.getElementById('y-pass').value;
            const res = await fetch(`${API_URL}/api/register-identity`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id, password: pass }) });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('drv_session', JSON.stringify({ session: data.session, nombre: data.nombre }));
                document.getElementById('auth-vault').style.display = 'none';
                hablar(`Bienvenido ${data.nombre}`);
            }
        }

        async function solicitarBiometria() {
            if (!window.PublicKeyCredential) return true;
            try {
                const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);
                await navigator.credentials.create({ publicKey: { challenge, rp: { name: "Drivery OS" }, user: { id: new Uint8Array([1]), name: "user", displayName: "Pilot" }, pubKeyCredParams: [{ alg: -7, type: "public-key" }], timeout: 60000 } });
                return true;
            } catch (e) { return false; }
        }

        async function ejecutarComando(cmd) {
            const session = localStorage.getItem('drv_session');
            if(!session) { document.getElementById('auth-vault').style.display = 'block'; return; }
            coreMat.color.setHex(0x7b2cbf);
            if(await solicitarBiometria()) {
                const res = await fetch(`${API_URL}/api/command`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ command: cmd, userCoords: userLocation, session: JSON.parse(session).session }) });
                const data = await res.json();
                if(data.coords) map.panTo(data.coords);
                mostrarTicket(data.display); hablar(data.reply);
            }
            coreMat.color.setHex(0x00d2ff);
        }

        function mostrarTicket(d) {
            const t = document.createElement('div'); t.className = 'ticket-ui';
            t.innerHTML = `<small style="color:var(--drivery-green)">BCV: ${d.tasa}</small><h3>$${d.usd}</h3><p style="font-size:18px;">${d.bs} Bs</p><small>${d.tiempo} MIN</small>`;
            document.body.appendChild(t); setTimeout(() => t.remove(), 8000);
        }

        function hablar(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

        window.onload = () => {
            const s = document.createElement('script'); s.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_KEY}&callback=initMap`;
            document.head.appendChild(s);
        };
    </script>
</body>
</html>
