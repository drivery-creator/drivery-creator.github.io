<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivery OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --drivery-blue: #00d2ff; --drivery-green: #39ff14; --glass-bg: rgba(6, 11, 20, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
        
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        #ui-layer > * { pointer-events: auto; }

        header { padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; justify-content: space-between; }
        .logo-main { height: 50px; filter: drop-shadow(0 0 10px var(--drivery-blue)); }

        main { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .orb-master { width: 250px; height: 250px; z-index: 10; cursor: pointer; touch-action: none; }

        /* PANEL DE PLANES - VISIBILIDAD MÁXIMA */
        #fleet-selection {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            width: 180px; display: none; flex-direction: column; gap: 10px; z-index: 9999;
        }
        .car-card {
            background: var(--glass-bg); border: 1px solid var(--drivery-blue);
            border-radius: 12px; padding: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        .car-name { color: var(--drivery-blue); font-family: 'Orbitron'; font-size: 10px; }
        .car-price { font-size: 20px; font-weight: 700; color: #fff; }
        .car-bs { color: var(--drivery-green); font-size: 11px; }

        #fleet-commander { margin: 20px; padding: 15px; background: var(--glass-bg); border-radius: 10px; width: fit-content; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="ui-layer">
        <header><img src="logo_app.png" class="logo-main"></header>
        <main><div id="main-orbe" class="orb-master"></div></main>
        <div id="fleet-selection"></div>
        <div id="fleet-commander"><div style="font-size:18px; font-weight:900; color:var(--drivery-blue);">RADAR ACTIVO</div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const GOOGLE_MAPS_KEY = "AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME";
        const API_URL = "https://drivery-backend.onrender.com";
        let map, directionsService, directionsRenderer, sphere, coreMat, recognition, isRecording = false;
        let userLocation = { lat: 10.48, lng: -66.90 };

        function initMap() {
            // MAPA ESTÁNDAR (Como Yummy) para asegurar compatibilidad total
            map = new google.maps.Map(document.getElementById("map"), { 
                center: userLocation, zoom: 15, disableDefaultUI: true 
            });
            
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ 
                map: map, polylineOptions: { strokeColor: "#00d2ff", strokeWeight: 6 } 
            });

            initThreeJS(); initVoice();
            if (navigator.geolocation) navigator.geolocation.getCurrentPosition(p => { 
                userLocation = { lat: p.coords.latitude, lng: p.coords.longitude }; 
                map.setCenter(userLocation); 
            });
        }

        async function ejecutarComando(cmd) {
            const session = JSON.parse(localStorage.getItem('drv_session'));
            if (!session) return;
            coreMat.color.setHex(0xffffff); // Blanco al procesar

            try {
                const res = await fetch(`${API_URL}/api/command`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ command: cmd, userCoords: userLocation, session: session.session })
                });
                const data = await res.json();

                if(data.coords && data.origin && data.display.fleet) {
                    // FORZAR TRAZADO DE RUTA
                    directionsService.route({
                        origin: new google.maps.LatLng(data.origin.lat, data.origin.lng),
                        destination: new google.maps.LatLng(data.coords.lat, data.coords.lng),
                        travelMode: 'DRIVING'
                    }, (result, status) => {
                        if (status === 'OK') directionsRenderer.setDirections(result);
                    });

                    // FORZAR INYECCIÓN DE PLANES
                    const container = document.getElementById('fleet-selection');
                    container.innerHTML = '';
                    container.style.display = 'flex';
                    data.display.fleet.forEach(car => {
                        const card = document.createElement('div');
                        card.className = 'car-card';
                        card.innerHTML = `<div class="car-name">${car.name}</div><div class="car-price">$${car.usd}</div><div class="car-bs">${car.bs} Bs.</div>`;
                        container.appendChild(card);
                    });
                }
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(data.reply));
            } catch(e) { console.error(e); }
            finally { coreMat.color.setHex(0x00d2ff); }
        }

        function initThreeJS() {
            const container = document.getElementById('main-orbe');
            const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); renderer.setSize(250, 250);
            container.appendChild(renderer.domElement);
            sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(1.1, 5), new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.2 }));
            coreMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true });
            const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 3), coreMat);
            sphere.add(core); scene.add(sphere); camera.position.z = 2.4;
            const animate = () => { requestAnimationFrame(animate); sphere.rotation.y += 0.003; renderer.render(scene, camera); };
            animate();
            container.addEventListener('pointerdown', () => { isRecording = true; coreMat.color.setHex(0xffffff); try { recognition.start(); } catch(e) {} });
            window.addEventListener('pointerup', () => { if (isRecording) { isRecording = false; recognition.stop(); coreMat.color.setHex(0x00d2ff); } });
        }

        function initVoice() {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-VE';
            recognition.onresult = (e) => ejecutarComando(e.results[0][0].transcript);
        }

        window.onload = () => {
            const s = document.createElement('script');
            s.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_KEY}&callback=initMap`;
            document.head.appendChild(s);
        };
    </script>
</body>
</html>
