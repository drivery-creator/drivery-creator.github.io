<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivery OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --drivery-blue: #00d2ff; --drivery-green: #39ff14; --drivery-purple: #7b2cbf;
            --glass-bg: rgba(6, 11, 20, 0.92); --glass-border: rgba(0, 210, 255, 0.3);
            --font-tech: 'Orbitron', sans-serif; --font-main: 'Rajdhani', sans-serif;
        }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: var(--font-main); color: #fff; }
        
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; background-color: #1a1f26; }
        .gm-style div, .gm-style span, .gm-style label, .gm-style a { text-shadow: none !important; outline: none !important; }

        #ui-layer { position: relative; z-index: 100; height: 100dvh; display: flex; flex-direction: column; pointer-events: none; align-items: center; }
        #ui-layer > * { pointer-events: auto; }

        header { width: 100%; display: flex; justify-content: space-between; align-items: flex-start; padding: 25px 30px; box-sizing: border-box; transition: 0.5s ease; }
        .logo-main { height: 45px; filter: drop-shadow(0 0 15px var(--drivery-blue)); }

        #fleet-selection { position: absolute; top: 20px; width: 90%; display: none; justify-content: center; flex-wrap: wrap; gap: 15px; z-index: 1000; padding-top: 10px; }
        .car-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 18px; padding: 12px 20px; cursor: pointer; animation: slideDown 0.6s ease; text-align: center; min-width: 120px; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        main { flex-grow: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); position: relative; }
        .orb-master { width: 280px; height: 280px; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); filter: drop-shadow(0 0 45px rgba(0, 210, 255, 0.5)); cursor: pointer; touch-action: none; user-select: none; }

        .route-active main { justify-content: flex-end; padding-bottom: 25px; }
        .route-active .orb-master { width: 85px; height: 85px; filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.6)); }
        .route-active header { opacity: 0; pointer-events: none; }

        /* AUTH VAULT REINTEGRADO */
        #auth-vault { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85%; max-width: 380px; background: var(--glass-bg); border: 1px solid var(--drivery-blue); 
            border-radius: 25px; padding: 35px; z-index: 2000; text-align: center; box-shadow: 0 0 60px rgba(0,210,255,0.2);
        }
        .vault-input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        .legal-box { display: flex; gap: 10px; text-align: left; font-size: 11px; color: #8a8d91; margin: 15px 0; line-height: 1.3; }
        .btn-sync { width: 100%; padding: 16px; border-radius: 12px; background: var(--drivery-purple); color: white; border: none; font-family: var(--font-tech); font-weight: 900; cursor: pointer; }
    </style>
</head>
<body id="body-context">
    <div id="map"></div>
    <div id="ui-layer">
        <header>
            <img src="logo_app.png" class="logo-main">
            <div id="u-balance" style="color:var(--drivery-green); font-family:var(--font-tech); font-weight:900; background:rgba(0,0,0,0.4); padding:8px 15px; border-radius:20px; border:1px solid var(--glass-border);">$0.00</div>
        </header>

        <div id="fleet-selection"></div>

        <main>
            <div id="main-orbe" class="orb-master"></div>
            <h2 id="orb-status" style="font-family:var(--font-tech); font-size:12px; color:var(--drivery-blue); margin-top:15px; text-align:center; letter-spacing:2px; opacity:0.8;">MANTENER PARA TRANSMITIR</h2>
        </main>
    </div>

    <div id="auth-vault">
        <div style="font-family:var(--font-tech); font-size:11px; color:var(--drivery-blue); letter-spacing:2px; margin-bottom:20px;">SINCRONIZACIÓN MAAS</div>
        <input id="y-id" class="vault-input" placeholder="Correo o Teléfono">
        <input id="y-pass" type="password" class="vault-input" placeholder="Clave de Acceso">
        <div class="legal-box">
            <input type="checkbox" id="legal-confirm" style="accent-color: var(--drivery-blue);">
            <label for="legal-confirm">Entiendo que Drivery OS orquesta mis aplicaciones de movilidad. Confirmo ser titular de estas credenciales y autorizo su uso para la gestión automatizada.</label>
        </div>
        <button class="btn-sync" onclick="iniciarVinculacion()">ESTABLECER ENLACE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const API_URL = "https://drivery-backend.onrender.com";
        const MAP_KEY = "AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME";
        let map, directionsRenderer, directionsService, sphere, coreMat, recognition, isRecording = false;
        let userPos = { lat: 10.48, lng: -66.90 };

        function speak(texto) {
            let textoLimpio = texto.replace(/Bs\.?/gi, "bolívares").replace(/\$/g, "dólares").replace(/(\d+)\.(\d{2})/g, "$1 con $2");
            const mensaje = new SpeechSynthesisUtterance(textoLimpio);
            mensaje.lang = 'es-VE'; mensaje.rate = 0.95; window.speechSynthesis.speak(mensaje);
        }

        async function validarBiometria() {
            if (!window.PublicKeyCredential) return true;
            try {
                const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);
                await navigator.credentials.create({ publicKey: { challenge, rp: { name: "Drivery OS" }, user: { id: new Uint8Array([1]), name: "user", displayName: "Pilot" }, pubKeyCredParams: [{ alg: -7, type: "public-key" }], authenticatorSelection: { userVerification: "required", authenticatorAttachment: "platform" }, timeout: 60000 } });
                return true;
            } catch (e) { return false; }
        }

        function initMap() {
            // MAPA ACLARADO PARA VER CALLES Y NOMBRES
            const style = [
                { "elementType": "geometry", "stylers": [{ "color": "#1a1f26" }] }, // Gris táctico
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#00d2ff" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "visibility": "off" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#2c343f" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#0d141c" }] }
            ];
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: null, polylineOptions: { strokeColor: "#00d2ff", strokeWeight: 6, zIndex: 999 } });
            map = new google.maps.Map(document.getElementById("map"), { center: userPos, zoom: 16, styles: style, disableDefaultUI: true });
            directionsRenderer.setMap(map);
            if (navigator.geolocation) navigator.geolocation.getCurrentPosition(p => { userPos = { lat: p.coords.latitude, lng: p.coords.longitude }; map.setCenter(userPos); });
            initThreeJS(); initVoice();
        }

        async function iniciarVinculacion() {
            const id = document.getElementById('y-id').value;
            const pass = document.getElementById('y-pass').value;
            const legal = document.getElementById('legal-confirm').checked;
            if(!id || !pass || !legal) { speak("Complete los datos y acepte la titularidad."); return; }
            try {
                const res = await fetch(`${API_URL}/api/register-identity`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id, password: pass }) });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('drv_session', JSON.stringify({ session: data.session, nombre: data.nombre }));
                    document.getElementById('auth-vault').style.display = 'none';
                    location.reload();
                } else { speak("Error de acceso."); }
            } catch(e) { speak("Fallo de red."); }
        }

        async function ejecutarComando(cmd) {
            const sessionRaw = localStorage.getItem('drv_session');
            
            // DETECCIÓN DE SESIÓN: Si no hay, abre la ventana y detiene el proceso
            if (!sessionRaw) {
                coreMat.color.setHex(0x7b2cbf);
                speak("Identidad no detectada. Por favor, vincule su dispositivo.");
                document.getElementById('auth-vault').style.display = 'block';
                return;
            }

            const session = JSON.parse(sessionRaw);
            coreMat.color.setHex(0x7b2cbf);
            if (await validarBiometria()) {
                document.getElementById('body-context').classList.add('route-active');
                coreMat.color.setHex(0xffffff);
                try {
                    const res = await fetch(`${API_URL}/api/command`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ command: cmd, userCoords: userPos, session: session.session }) });
                    const data = await res.json();
                    if(data.destCoords) {
                        directionsService.route({ origin: userPos, destination: data.destCoords, travelMode: 'DRIVING' }, (r, s) => { if (s === 'OK') directionsRenderer.setDirections(r); });
                        mostrarFlota(data.display.fleet);
                        speak(data.reply);
                    }
                } catch(e) { speak("Fallo de red táctica."); }
            }
            coreMat.color.setHex(0x00d2ff);
        }

        function mostrarFlota(fleet) {
            const panel = document.getElementById('fleet-selection');
            panel.innerHTML = ''; panel.style.display = 'flex';
            fleet.forEach((car, index) => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `<div style="font-size:8px; color:var(--drivery-blue); font-family:var(--font-tech);">${car.name.toUpperCase()}</div><div style="font-size:18px; font-weight:900;">$${car.usd}</div><div style="font-size:10px; color:var(--drivery-green);">${car.bs} Bs.</div>`;
                panel.appendChild(card);
            });
        }

        function initThreeJS() {
            const container = document.getElementById('main-orbe');
            const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); renderer.setSize(280, 280);
            container.appendChild(renderer.domElement);
            sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(1.1, 5), new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.15 }));
            coreMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.6 });
            const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 3), coreMat);
            sphere.add(core); scene.add(sphere); camera.position.z = 2.4;
            const animate = () => { requestAnimationFrame(animate); sphere.rotation.y += 0.003; core.rotation.y -= 0.006; renderer.render(scene, camera); }; 
            animate();
            const obs = new ResizeObserver(() => { const w = container.clientWidth; renderer.setSize(w, w); camera.aspect = 1; camera.updateProjectionMatrix(); });
            obs.observe(container);
            const startTalk = (e) => { e.preventDefault(); isRecording = true; coreMat.color.setHex(0xffffff); sphere.scale.set(1.1, 1.1, 1.1); document.getElementById('orb-status').innerText = "TRANSMITIENDO..."; try { recognition.start(); } catch(err) {} };
            const stopTalk = () => { if (isRecording) { isRecording = false; coreMat.color.setHex(0x00d2ff); sphere.scale.set(1, 1, 1); document.getElementById('orb-status').innerText = "PROCESANDO..."; recognition.stop(); } };
            container.addEventListener('mousedown', startTalk); window.addEventListener('mouseup', stopTalk);
            container.addEventListener('touchstart', startTalk); container.addEventListener('touchend', stopTalk);
        }

        function initVoice() { recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); recognition.lang = 'es-VE'; recognition.onresult = (e) => ejecutarComando(e.results[0][0].transcript); }
        window.onload = () => { const s = document.createElement('script'); s.src = `https://maps.googleapis.com/maps/api/js?key=${MAP_KEY}&callback=initMap`; document.head.appendChild(s); };
    </script>
</body>
</html>
