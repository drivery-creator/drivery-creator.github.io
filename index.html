<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivery OS | Master Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --drivery-blue: #00d2ff;
            --drivery-green: #39ff14;
            --drivery-purple: #7b2cbf;
            --glass-bg: rgba(6, 11, 20, 0.85);
            --glass-border: rgba(0, 210, 255, 0.3);
            --font-tech: 'Orbitron', sans-serif;
            --font-main: 'Rajdhani', sans-serif;
        }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: var(--font-main); color: #fff; }
        
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; background-color: #0a0a0a; }

        /* Capas de UI */
        #ui-layer { position: relative; z-index: 100; height: 100dvh; display: flex; flex-direction: column; pointer-events: none; justify-content: space-between; }
        #ui-layer > * { pointer-events: auto; }
        
        header { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 30px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        .brand-box { display: flex; align-items: center; gap: 8px; }
        .logo-main { height: 60px; filter: drop-shadow(0 0 15px var(--drivery-blue)); }

        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .orb-master { width: 300px; height: 300px; position: relative; z-index: 10; filter: drop-shadow(0 0 45px rgba(0, 210, 255, 0.5)); cursor: pointer; touch-action: none; }
        
        /* Selector de Flota Lateral */
        #fleet-selection {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 200px; display: none; flex-direction: column; gap: 12px; z-index: 500;
        }
        .car-card {
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 15px;
            padding: 12px; cursor: pointer; transition: 0.3s;
            animation: slideInRight 0.5s ease-out;
        }
        .car-card:hover { border-color: var(--drivery-blue); box-shadow: 0 0 15px rgba(0,210,255,0.3); }
        .car-name { font-family: var(--font-tech); font-size: 11px; color: var(--drivery-blue); margin-bottom: 4px; }
        .car-price { font-size: 20px; font-weight: 700; color: #fff; }
        .car-bs { font-size: 11px; color: var(--drivery-green); }

        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        .ticket-ui {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--drivery-blue);
            padding: 15px 25px; border-radius: 20px; z-index: 1000; text-align: center;
        }

        #auth-vault {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 380px; background: var(--glass-bg); backdrop-filter: blur(50px);
            border: 1px solid var(--drivery-blue); border-radius: 30px; padding: 30px; z-index: 2000; text-align: center;
        }
        .vault-input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        .btn-purple { width: 100%; padding: 16px; border-radius: 12px; background: var(--drivery-purple); color: white; border: none; font-family: var(--font-tech); font-size: 11px; font-weight: 900; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="ui-layer">
        <header>
            <div class="brand-box">
                <img src="logo_app.png" alt="DRIVERY" class="logo-main">
            </div>
            <div style="text-align: right; font-family: var(--font-tech); font-size: 10px; color: var(--drivery-blue);">
                STATUS: <span style="color: var(--drivery-green);">ONLINE</span>
            </div>
        </header>

        <main>
            <div id="main-orbe" class="orb-master"></div>
            <h2 id="orb-status" style="font-family:var(--font-tech); font-size:16px; color:var(--drivery-blue); margin-top:20px; text-shadow: 0 0 10px #000;">MANTENER PARA TRANSMITIR</h2>
        </main>

        <div id="fleet-selection"></div>
    </div>

    <div id="auth-vault">
        <div style="font-family:var(--font-tech); font-size:11px; color:var(--drivery-blue); letter-spacing:3px; margin-bottom:20px;">ACCESO AL NÚCLEO</div>
        <input id="y-id" class="vault-input" type="text" placeholder="Correo / Teléfono">
        <input id="y-pass" class="vault-input" type="password" placeholder="Contraseña">
        <button class="btn-purple" onclick="sincronizar()">VINCULAR DISPOSITIVO</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const GOOGLE_MAPS_KEY = "AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME";
        const API_URL = "https://drivery-backend.onrender.com";
        let map, directionsService, directionsRenderer, sphere, coreMat, recognition, isRecording = false;
        let fleetMarkers = [];
        let updateInterval;
        let userLocation = { lat: 10.48, lng: -66.90 };

        function initMap() {
            const tacticalStyle = [
                { "elementType": "geometry", "stylers": [{ "color": "#1a1c1e" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#24282b" }] },
                { "featureType": "road.highway", "elementType": "geometry.stroke", "stylers": [{ "color": "#00d2ff" }, { "weight": 0.5 }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#0d1117" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#00d2ff" }] }
            ];

            map = new google.maps.Map(document.getElementById("map"), {
                center: userLocation, zoom: 15, styles: tacticalStyle, disableDefaultUI: true
            });

            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({
                map: map, suppressMarkers: false,
                polylineOptions: { strokeColor: "#00d2ff", strokeWeight: 6, strokeOpacity: 0.8 }
            });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    map.setCenter(userLocation);
                });
            }

            initThreeJS();
            initVoice();
            verificarSesion();
        }

        function initThreeJS() {
            const container = document.getElementById('main-orbe');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(300, 300); container.appendChild(renderer.domElement);

            sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(1.1, 5), new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.15 }));
            coreMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.6 });
            const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 3), coreMat);
            sphere.add(core); scene.add(sphere); camera.position.z = 2.4;

            const animate = () => { requestAnimationFrame(animate); sphere.rotation.y += 0.003; renderer.render(scene, camera); };
            animate();

            container.addEventListener('pointerdown', () => {
                isRecording = true; coreMat.color.setHex(0xffffff);
                try { recognition.start(); } catch(e) {}
            });
            window.addEventListener('pointerup', () => {
                if (isRecording) { isRecording = false; coreMat.color.setHex(0x00d2ff); recognition.stop(); }
            });
        }

        function initVoice() {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-VE';
            recognition.onresult = (e) => ejecutarComando(e.results[0][0].transcript);
        }

        async function ejecutarComando(cmd) {
            const sessionRaw = localStorage.getItem('drv_session');
            const credsRaw = localStorage.getItem('drv_creds');
            if (!sessionRaw) { document.getElementById('auth-vault').style.display = 'block'; return; }

            coreMat.color.setHex(0x7b2cbf);
            try {
                const res = await fetch(`${API_URL}/api/command`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        command: cmd, 
                        userCoords: userLocation, 
                        session: JSON.parse(sessionRaw).session,
                        credentials: credsRaw ? JSON.parse(credsRaw) : null 
                    })
                });
                const data = await res.json();
                
                if(data.coords && data.origin) {
                    trazarRuta(data.origin, data.coords);
                    renderizarFlotaEnMapa(data.origin);
                    mostrarPanelFlota(data.display.fleet, data.display.tasa);
                }
                hablar(data.reply);
            } catch(e) { hablar("Error de sincronización."); }
            finally { coreMat.color.setHex(0x00d2ff); }
        }

        function trazarRuta(orig, dest) {
            const request = {
                origin: new google.maps.LatLng(orig.lat, orig.lng),
                destination: new google.maps.LatLng(dest.lat, dest.lng),
                travelMode: 'DRIVING'
            };
            directionsService.route(request, (result, status) => {
                if (status === 'OK') directionsRenderer.setDirections(result);
            });
        }

        function renderizarFlotaEnMapa(centro) {
            if (updateInterval) clearInterval(updateInterval);
            fleetMarkers.forEach(m => m.setMap(null));
            fleetMarkers = [];

            for(let i=0; i<5; i++) {
                const marker = new google.maps.Marker({
                    position: { 
                        lat: centro.lat + (Math.random() - 0.5) * 0.006, 
                        lng: centro.lng + (Math.random() - 0.5) * 0.006 
                    },
                    map: map,
                    icon: {
                        path: "M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z",
                        fillColor: "#00d2ff", fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 1, scale: 1.5, anchor: new google.maps.Point(12, 12), rotation: Math.random() * 360
                    },
                    optimized: false
                });
                marker.metadata = { angle: Math.random() * 360, speed: 0.00005 + (Math.random() * 0.0001) };
                fleetMarkers.push(marker);
            }

            updateInterval = setInterval(() => {
                fleetMarkers.forEach(m => {
                    const pos = m.getPosition();
                    const meta = m.metadata;
                    const newLat = pos.lat() + Math.cos(meta.angle * Math.PI / 180) * meta.speed;
                    const newLng = pos.lng() + Math.sin(meta.angle * Math.PI / 180) * meta.speed;
                    m.setPosition({ lat: newLat, lng: newLng });
                    const icon = m.getIcon(); icon.rotation = meta.angle - 90; m.setIcon(icon);
                    meta.angle += (Math.random() - 0.5) * 10;
                });
            }, 1500);
        }

        function mostrarPanelFlota(fleet, tasa) {
            const container = document.getElementById('fleet-selection');
            container.innerHTML = ''; container.style.display = 'flex';
            fleet.forEach(car => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.innerHTML = `
                    <div class="car-name">${car.name.toUpperCase()}</div>
                    <div class="car-price">$${car.usd}</div>
                    <div class="car-bs">${car.bs} Bs.</div>
                    <div style="font-size:9px; color:#8a8d91; margin-top:4px;">ETA: ${car.arrival}</div>
                `;
                container.appendChild(card);
            });
            mostrarTicketTasa(tasa);
        }

        function mostrarTicketTasa(tasa) {
            const t = document.createElement('div'); t.className = 'ticket-ui';
            t.innerHTML = `<small style="color:var(--drivery-green)">TASA OFICIAL BCV: ${tasa}</small>`;
            document.body.appendChild(t); setTimeout(() => t.remove(), 10000);
        }

        async function sincronizar() {
            const id = document.getElementById('y-id').value;
            const pass = document.getElementById('y-pass').value;
            if(!id || !pass) return;
            try {
                const res = await fetch(`${API_URL}/api/register-identity`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id, password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('drv_session', JSON.stringify({ session: data.session, nombre: data.nombre }));
                    localStorage.setItem('drv_creds', JSON.stringify({ id, pass }));
                    document.getElementById('auth-vault').style.display = 'none';
                    document.getElementById('orb-status').innerText = `BIENVENIDO, ${data.nombre.toUpperCase()}`;
                }
            } catch (e) { alert("Error de enlace"); }
        }

        function verificarSesion() {
            const saved = localStorage.getItem('drv_session');
            if(saved) {
                const data = JSON.parse(saved);
                document.getElementById('orb-status').innerText = `BIENVENIDO, ${data.nombre.toUpperCase()}`;
            }
        }

        function hablar(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

        window.onload = () => {
            const s = document.createElement('script');
            s.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_KEY}&callback=initMap`;
            document.head.appendChild(s);
        };
    </script>
</body>
</html>
