<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivery OS | The Orbe Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* ESTÉTICA DEL BÚNKER */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #010203; overflow: hidden; font-family: 'Inter', sans-serif; }
        #map { height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* SIDEBAR TÁCTICO */
        #sidebar {
            position: absolute; top: 20px; left: 20px; width: 320px; z-index: 100;
            background: rgba(10, 15, 23, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 20px; padding: 30px; color: white;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        .logo-container { text-align: center; margin-bottom: 25px; }
        .drivery-logo { font-family: 'Orbitron', sans-serif; font-size: 30px; font-weight: 900; letter-spacing: 6px; color: #fff; text-shadow: 0 0 15px rgba(0, 210, 255, 0.6); margin: 0; }
        .rif-tag { font-size: 10px; color: #5a5f66; margin-top: 5px; letter-spacing: 3px; font-weight: 700; }
        .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); margin: 20px 0; }

        .stat-card { margin-bottom: 20px; }
        .stat-label { font-size: 9px; color: #8a8d91; letter-spacing: 2px; margin-bottom: 4px; font-weight: 700; }
        .stat-value { font-size: 26px; font-weight: 900; font-family: 'Orbitron', sans-serif; }

        #os-status { color: #f39c12; font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        #os-status::before { content: ''; width: 8px; height: 8px; background: currentColor; border-radius: 50%; display: inline-block; animation: pulse-status 2s infinite; }

        .blue-fleet .stat-value { color: #00d2ff; }
        .green-fleet .stat-value { color: #39ff14; }

        .total-bar { background: rgba(0, 210, 255, 0.08); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(0, 210, 255, 0.2); }
        .total-label { font-size: 9px; color: #00d2ff; letter-spacing: 2px; font-weight: 900; }
        .total-value { font-size: 30px; color: #fff; font-weight: 900; }

        @keyframes pulse-status { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.3); } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo-container">
            <h1 class="drivery-logo">DRIVERY</h1>
            <div class="rif-tag">RIF: J-50478174-5</div>
        </div>
        <div class="divider"></div>
        <div class="stat-card">
            <div class="stat-label">SISTEMA OPERATIVO</div>
            <div class="stat-value" id="os-status">INICIANDO PROTOCOLOS...</div>
        </div>
        <div class="stat-card blue-fleet">
            <div class="stat-label">FLOTA BLUE (PASAJEROS)</div>
            <div class="stat-value" id="blue-count">0</div>
        </div>
        <div class="stat-card green-fleet">
            <div class="stat-label">FLOTA GREEN (LOGÍSTICA)</div>
            <div class="stat-value" id="green-count">0</div>
        </div>
        <div class="total-bar">
            <div class="total-label">TOTAL UNIDADES MUNDIALES</div>
            <div class="total-value" id="total-count">0</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map;
        let markers = [];
        // --- CONFIGURACIÓN DE URLS SIN LA BARRA FINAL (IMPORTANTE) ---
        const BACKEND_HTTP = "https://drivery-backend.onrender.com";
        const BACKEND_WS = "wss://drivery-backend.onrender.com";
        let socket;

        // --- DESPERTAR SERVIDOR ---
        async function wakeUpAndConnect() {
            console.log("🎥 Drivery OS: Despertando servidor...");
            document.getElementById('os-status').innerText = "REANIMANDO EL ORBE...";
            document.getElementById('os-status').style.color = "#f39c12";

            try {
                // Toque HTTP para despertar Render
                await fetch(BACKEND_HTTP, { mode: 'no-cors' });
                console.log("⚡ Servidor detectado. Esperando 3s para estabilidad...");
                // Damos un tiempo de "warm-up" antes de lanzar el WebSocket
                setTimeout(initWebSocket, 3000);
            } catch (e) {
                console.error("❌ Búnker no responde.");
                setTimeout(wakeUpAndConnect, 5000);
            }
        }

        // --- INICIAR EL ORBE (WEBSOCKET) ---
        function initWebSocket() {
            console.log("📡 Conectando a frecuencia:", BACKEND_WS);
            socket = new WebSocket(BACKEND_WS);

            socket.onopen = () => {
                console.log("✅ ENLACE ESTABLECIDO.");
                document.getElementById('os-status').innerText = "CONEXIÓN SATELITAL ACTIVA";
                document.getElementById('os-status').style.color = "#00d2ff";
                
                // Heartbeat para que Render no nos corte
                setInterval(() => {
                    if (socket.readyState === WebSocket.OPEN) {
                        socket.send(JSON.stringify({ type: 'ping' }));
                    }
                }, 20000);
            };

            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if(data.metrics) {
                        animateValue("blue-count", data.metrics.blueFleet);
                        animateValue("green-count", data.metrics.greenFleet);
                        animateValue("total-count", data.metrics.totalUnits);
                    }
                    if(data.vehicles) renderVehicles(data.vehicles);
                } catch (err) { console.warn("Señal con ruido."); }
            };

            socket.onclose = () => {
                console.warn("⚠️ Conexión perdida.");
                document.getElementById('os-status').innerText = "RECONECTANDO SISTEMA...";
                document.getElementById('os-status').style.color = "#ff3e3e";
                setTimeout(wakeUpAndConnect, 5000);
            };
        }

        // --- MAPA ---
        function initMap() {
            const darkStyle = [
                { "elementType": "geometry", "stylers": [{ "color": "#1d1f21" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#8ec3b9" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "color": "#1d1f21" }] },
                { "featureType": "landscape", "stylers": [{ "color": "#111214" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#282a2e" }] },
                { "featureType": "water", "stylers": [{ "color": "#000000" }] }
            ];

            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 10.4806, lng: -66.8983 },
                zoom: 13,
                styles: darkStyle,
                disableDefaultUI: true
            });

            console.log("✅ Mapa listo. Iniciando Orbe...");
            wakeUpAndConnect();
        }

        function animateValue(id, end) {
            const obj = document.getElementById(id);
            let start = parseInt(obj.innerText.replace(/,/g, '')) || 0;
            if (start === end) return;
            let duration = 1500;
            let startTime = null;

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = Math.min((timestamp - startTime) / duration, 1);
                let current = Math.floor(progress * (end - start) + start);
                obj.innerText = current.toLocaleString();
                if (progress < 1) window.requestAnimationFrame(step);
            }
            window.requestAnimationFrame(step);
        }

        function renderVehicles(vehicles) {
            markers.forEach(m => m.setMap(null));
            markers = [];
            vehicles.forEach(v => {
                const marker = new google.maps.Marker({
                    position: { lat: v.lat, lng: v.lng },
                    map: map,
                    icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: v.type === 'blue' ? '#00d2ff' : '#39ff14', fillOpacity: 0.8, strokeWeight: 2, strokeColor: '#fff', scale: 6 }
                });
                markers.push(marker);
            });
        }
    </script>

    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME&callback=initMap"></script>
</body>
</html>
