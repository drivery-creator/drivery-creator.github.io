<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drivery OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --drivery-blue: #00d2ff; --drivery-green: #39ff14; --drivery-purple: #7b2cbf;
            --glass-bg: rgba(6, 11, 20, 0.96); --glass-border: rgba(0, 210, 255, 0.2);
            --font-tech: 'Orbitron', sans-serif; --font-main: 'Rajdhani', sans-serif;
        }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: var(--font-main); color: #fff; }
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; background-color: #000; }
        
        #ui-layer { position: relative; z-index: 100; height: 100dvh; display: flex; flex-direction: column; pointer-events: none; align-items: center; justify-content: space-between; }
        #ui-layer > * { pointer-events: auto; }

        header { width: 100%; display: flex; justify-content: space-between; padding: 25px 30px; box-sizing: border-box; }
        .logo-main { height: 42px; filter: drop-shadow(0 0 10px var(--drivery-blue)); }

        #fleet-selection { position: absolute; top: 20px; width: 95%; display: none; justify-content: center; flex-wrap: wrap; gap: 10px; z-index: 1000; }
        .car-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 15px; padding: 12px; min-width: 90px; text-align: center; cursor: pointer; outline: none; transition: 0.3s; }
        .car-card.selected { border-color: var(--drivery-green); box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); }

        /* ORBE CENTRADO */
        main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .orb-container { position: relative; width: 280px; height: 280px; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 500; }
        .orb-master { width: 100%; height: 100%; cursor: pointer; touch-action: none; outline: none; }

        .route-active .orb-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; }
        .route-active header { opacity: 0; pointer-events: none; }

        #confirm-panel { position: fixed; bottom: 120px; display: none; width: 100%; justify-content: center; z-index: 200; }
        .btn-action { background: var(--drivery-purple); color: #fff; border: none; padding: 12px 40px; border-radius: 30px; font-family: var(--font-tech); font-weight: 900; letter-spacing: 1px; cursor: pointer; outline: none; }

        #search-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .loader { width: 45px; height: 45px; border: 2px solid rgba(0,210,255,0.1); border-top-color: var(--drivery-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="search-modal"><div class="loader"></div><h3 style="font-family:var(--font-tech); color:var(--drivery-blue); margin-top:20px; font-size:12px; letter-spacing:2px;">LOCALIZANDO UNIDAD</h3><p id="search-timer" style="font-size:14px; opacity:0.6;">00:00</p></div>

    <div id="ui-layer">
        <header><img src="logo_app.png" class="logo-main"><div style="color:var(--drivery-green); font-family:var(--font-tech); font-weight:900; font-size:18px;">$0.00</div></header>
        <div id="fleet-selection"></div>
        <div id="confirm-panel"><button class="btn-action" onclick="confirmarViaje()">CONFIRMAR</button></div>
        <main>
            <div class="orb-container" id="orb-wrapper"><div id="main-orbe" class="orb-master"></div></div>
            <h2 id="orb-status" style="font-family:var(--font-tech); font-size:9px; color:var(--drivery-blue); margin-top:12px; letter-spacing:3px; opacity:0.8;">SISTEMA LISTO</h2>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const API_URL = "https://drivery-backend.onrender.com";
        const MAP_KEY = "AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME";
        let map, directionsRenderer, directionsService, sphere, coreMat, recognition, isRecording = false;
        let userPos = { lat: 10.48, lng: -66.90 };

        function speak(t) { const m = new SpeechSynthesisUtterance(t); m.lang = 'es-VE'; window.speechSynthesis.speak(m); }

        function initMap() {
            // ELIMINACIÓN AGRESIVA DE BORDES: Sincronizamos el stroke con el color de fondo
            const style = [
                { "elementType": "geometry", "stylers": [{ "color": "#0d1014" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#00d2ff" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "color": "#0d1014" }, { "weight": 1 }] }, // El borde ahora es del color del mapa
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#1f252d" }] },
                { "featureType": "road.highway", "elementType": "geometry", "stylers": [{ "color": "#2e3743" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#06090c" }] },
                { "featureType": "poi", "stylers": [{ "visibility": "off" }] },
                { "featureType": "transit", "stylers": [{ "visibility": "off" }] }
            ];
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ 
                map: null, 
                suppressMarkers: true, 
                polylineOptions: { strokeColor: "#00d2ff", strokeWeight: 5, strokeOpacity: 0.8 } 
            });
            map = new google.maps.Map(document.getElementById("map"), { center: userPos, zoom: 16, styles: style, disableDefaultUI: true });
            directionsRenderer.setMap(map);
            if (navigator.geolocation) navigator.geolocation.getCurrentPosition(p => { userPos = { lat: p.coords.latitude, lng: p.coords.longitude }; map.setCenter(userPos); });
            initThreeJS(); initVoice();
        }

        async function ejecutarComando(cmd) {
            document.body.classList.add('route-active');
            coreMat.color.setHex(0xffffff);
            document.getElementById('orb-status').innerText = "SINCRONIZANDO...";
            
            try {
                const res = await fetch(`${API_URL}/api/command`, { 
                    method: "POST", headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ command: cmd, userCoords: userPos }) 
                });
                const data = await res.json();
                if(data.destCoords) {
                    // Marcadores Neón sin etiquetas (Evita el halo blanco de Google)
                    const icon = (color) => ({ path: google.maps.SymbolPath.CIRCLE, fillColor: color, fillOpacity: 1, strokeColor: '#000', strokeWeight: 1, scale: 8 });
                    new google.maps.Marker({ position: userPos, map: map, icon: icon('#39ff14') }); // Punto A Verde
                    new google.maps.Marker({ position: data.destCoords, map: map, icon: icon('#00d2ff') }); // Punto B Azul
                    
                    directionsService.route({ origin: userPos, destination: data.destCoords, travelMode: 'DRIVING' }, (r, s) => { if (s === 'OK') directionsRenderer.setDirections(r); });
                    mostrarFlota(data.display.fleet);
                    speak(data.reply);
                }
            } catch(e) { speak("Reintentando conexión."); } 
            finally { coreMat.color.setHex(0x00d2ff); document.getElementById('orb-status').innerText = "NÚCLEO ACTIVO"; }
        }

        function mostrarFlota(f) {
            const p = document.getElementById('fleet-selection');
            p.innerHTML = ''; p.style.display = 'flex';
            f.forEach(c => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.innerHTML = `<div style="font-size:7px; color:var(--drivery-blue);">${c.name.toUpperCase()}</div><div style="font-size:16px; font-weight:900;">$${c.usd}</div><div style="font-size:9px; color:var(--drivery-green);">${c.bs} Bs.</div>`;
                card.onclick = () => {
                    document.querySelectorAll('.car-card').forEach(x => x.classList.remove('selected'));
                    card.classList.add('selected');
                    document.getElementById('confirm-panel').style.display = 'flex';
                };
                p.appendChild(card);
            });
        }

        function confirmarViaje() {
            document.getElementById('search-modal').style.display = 'flex';
            let s = 0; setInterval(() => { s++; document.getElementById('search-timer').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }, 1000);
            speak("Buscando unidad disponible.");
        }

        function initThreeJS() {
            const container = document.getElementById('main-orbe');
            const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); renderer.setSize(280, 280);
            container.appendChild(renderer.domElement);
            sphere = new THREE.Mesh(new THREE.IcosahedronGeometry(1.1, 5), new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.15 }));
            coreMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.6 });
            const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 3), coreMat);
            sphere.add(core); scene.add(sphere); camera.position.z = 2.4;
            const animate = () => { requestAnimationFrame(animate); sphere.rotation.y += 0.003; core.rotation.y -= 0.006; renderer.render(scene, camera); }; animate();
            
            const startTalk = (e) => { e.preventDefault(); isRecording = true; coreMat.color.setHex(0xffffff); try { recognition.start(); } catch(err) {} };
            const stopTalk = () => { if (isRecording) { isRecording = false; coreMat.color.setHex(0x00d2ff); recognition.stop(); } };
            container.addEventListener('mousedown', startTalk); window.addEventListener('mouseup', stopTalk);
            container.addEventListener('touchstart', startTalk); container.addEventListener('touchend', stopTalk);

            new ResizeObserver(() => {
                const w = container.clientWidth; renderer.setSize(w, w);
                camera.aspect = 1; camera.updateProjectionMatrix();
            }).observe(container);
        }

        function initVoice() { recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); recognition.lang = 'es-VE'; recognition.onresult = (e) => ejecutarComando(e.results[0][0].transcript); }
        window.onload = () => { const s = document.createElement('script'); s.src = `https://maps.googleapis.com/maps/api/js?key=${MAP_KEY}&callback=initMap`; document.head.appendChild(s); };
    </script>
</body>
</html>
