<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivery OS | AlphaZero Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #010203; overflow: hidden; font-family: 'Inter', sans-serif; }
        #map { height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; filter: brightness(0.6) contrast(1.2); }

        /* PANEL DE MANDO */
        #sidebar {
            position: absolute; top: 20px; left: 20px; width: 320px; z-index: 100;
            background: rgba(10, 15, 23, 0.8); backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 20px; padding: 25px; color: white;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9); text-align: center;
        }

        .drivery-logo { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: 6px; color: #fff; margin: 0; text-shadow: 0 0 15px rgba(0, 210, 255, 0.6); }
        .rif-tag { font-size: 9px; color: #5a5f66; letter-spacing: 2px; margin-top: 5px; font-weight: 700; }
        
        /* EL ORBE: EL CORAZÓN DEL SISTEMA */
        .orb-container { margin: 25px auto; width: 100px; height: 100px; position: relative; }
        .the-orb {
            width: 100%; height: 100%; background: radial-gradient(circle, #00d2ff 0%, #001a2c 70%);
            border-radius: 50%; position: relative;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.2);
            animation: orb-glow 3s infinite ease-in-out;
        }
        .orb-ring {
            position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 50%;
            animation: rotate-ring 4s linear infinite;
        }

        .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(0, 210, 255, 0.3), transparent); margin: 20px 0; }

        .stat-card { text-align: left; margin-bottom: 15px; }
        .stat-label { font-size: 9px; color: #8a8d91; letter-spacing: 2px; font-weight: 700; }
        .stat-value { font-size: 24px; font-weight: 900; font-family: 'Orbitron', sans-serif; color: #00d2ff; }
        
        #os-status { color: #00d2ff; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #os-status::before { content: ''; width: 6px; height: 6px; background: currentColor; border-radius: 50%; animation: pulse-status 1s infinite; }

        /* ANIMACIONES HOLLYWOOD */
        @keyframes orb-glow { 0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 210, 255, 0.4); } 50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(0, 210, 255, 0.7); } }
        @keyframes rotate-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse-status { 0% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1 class="drivery-logo">DRIVERY</h1>
        <div class="rif-tag">RIF: J-50478174-5</div>

        <div class="orb-container">
            <div class="orb-ring"></div>
            <div class="the-orb"></div>
        </div>

        <div id="os-status">MODO INTELIGENCIA ACTIVA</div>
        <div class="divider"></div>

        <div class="stat-card">
            <div class="stat-label">FLOTA BLUE (INTERCEPTADOS)</div>
            <div class="stat-value" id="blue-count">28,450</div>
        </div>

        <div class="stat-card">
            <div class="stat-label">FLOTA GREEN (LOGÍSTICA)</div>
            <div class="stat-value" id="green-count" style="color: #39ff14;">19,720</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map;
        const BACKEND_WS = "wss://drivery-backend.onrender.com";

        // SIMULACIÓN DE DATOS (Para que nunca esté en cero)
        function startSimulation() {
            setInterval(() => {
                let blue = parseInt(document.getElementById('blue-count').innerText.replace(/,/g, ''));
                let green = parseInt(document.getElementById('green-count').innerText.replace(/,/g, ''));
                
                // Pequeñas variaciones aleatorias para simular vida real
                document.getElementById('blue-count').innerText = (blue + Math.floor(Math.random() * 5)).toLocaleString();
                document.getElementById('green-count').innerText = (green + Math.floor(Math.random() * 3)).toLocaleString();
            }, 3000);
        }

        function initMap() {
            const darkStyle = [
                { "elementType": "geometry", "stylers": [{ "color": "#1d1f21" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#8ec3b9" }] },
                { "featureType": "landscape", "stylers": [{ "color": "#111214" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#282a2e" }] },
                { "featureType": "water", "stylers": [{ "color": "#000000" }] }
            ];

            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 10.4806, lng: -66.8983 },
                zoom: 14,
                styles: darkStyle,
                disableDefaultUI: true
            });

            startSimulation();
            console.log("✅ Sistema en Modo Simulación Inteligente.");
            
            // Intento de conexión real en segundo plano
            const socket = new WebSocket(BACKEND_WS);
            socket.onopen = () => {
                document.getElementById('os-status').innerText = "CONEXIÓN SATELITAL ACTIVA";
                document.getElementById('os-status').style.color = "#39ff14";
            };
        }
    </script>

    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAFwND09Y6rrNzVrhOdu5wGptY063y-fME&callback=initMap"></script>
</body>
</html>
