<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drivery - Registro</title>

    <style>
        /* 🚫 CURSOR INVISIBLE 🚫 */
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body, button, input, select, textarea { cursor: none !important; }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            background-color: #050505;
            font-family: -apple-system, system-ui, sans-serif; 
            overflow: hidden; touch-action: none; 
            color: white;
            display: flex; align-items: center; justify-content: center;
        }

        /* 💡 LUCES DE FONDO 💡 */
        .luces-fondo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; overflow: hidden;
        }
        .luz {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.3;
            animation: moverLuz 20s linear infinite alternate;
        }
        .luz-1 { width: 400px; height: 400px; background: #32BC81; top: -100px; left: -100px; }
        .luz-2 { width: 350px; height: 350px; background: #28a36f; bottom: -50px; right: -50px; animation-delay: -5s; }
        
        @keyframes moverLuz { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

        /* ⚾ RECUPERACIÓN DE LA PELOTA ORIGINAL ⚾ */
        #ball-container { 
            position: fixed; width: 36px; height: 36px; 
            pointer-events: none; z-index: 99999; left: 0; top: 0; 
            transition: transform 0.05s linear;
        }
        #ball-cursor { 
            width: 100%; height: 100%; 
            background: #fff; 
            border-radius: 50%; 
            position: relative; 
            overflow: hidden;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.2), 0 0 15px rgba(255,255,255,0.3);
            animation: rotarPelota 4s linear infinite;
        }
        /* Costuras Rojas Originales */
        #ball-cursor::before, #ball-cursor::after {
            content: ""; position: absolute;
            width: 120%; height: 120%;
            border: 2px dashed #ff0000;
            border-radius: 50%;
            left: -10%;
        }
        #ball-cursor::before { top: -70%; }
        #ball-cursor::after { bottom: -70%; }

        @keyframes rotarPelota { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        /* ✨ GLASSMORPHISM ✨ */
        #main-wrapper { position: relative; z-index: 10; width: 100%; padding: 20px; display: flex; justify-content: center; }

        .card {
            background: rgba(25, 25, 25, 0.45);
            padding: 35px 25px; border-radius: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            max-width: 380px; width: 100%; 
            display: none; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #logo-app { width: 85px; height: 85px; margin-bottom: 20px; border-radius: 20px; border: 1.5px solid rgba(50, 188, 129, 0.5); }
        
        /* BOTONES TIENDAS */
        .store-button {
            display: block;
            margin: 15px auto;
            width: 200px;
            transition: transform 0.2s;
            text-decoration: none;
        }
        .store-button img { width: 100%; height: auto; border-radius: 8px; }

        .btn-choice {
            background: rgba(25, 25, 25, 0.6); color: white; border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 22px; width: 100%; border-radius: 20px; margin-bottom: 15px; font-size: 16px; font-weight: 700; 
            display: flex; align-items: center; justify-content: space-between;
        }

        input, select, textarea {
            width: 100%; background: rgba(0, 0, 0, 0.4) !important; border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white !important; padding: 16px; border-radius: 16px; margin-bottom: 12px; font-size: 15px;
        }
        
        select option { background-color: #111; color: white; }

        .btn-primary { 
            background: #32BC81; color: #000; padding: 18px; 
            border-radius: 16px; font-weight: 900; font-size: 16px; border: none; width: 100%; 
        }

        .btn-back { background: none; border: none; color: rgba(255, 255, 255, 0.4); font-size: 13px; margin-top: 20px; text-decoration: underline; }

        /* ÉXITO */
        #mensaje-exito h2 { color: #32BC81; font-size: 28px; font-weight: 900; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="luces-fondo">
        <div class="luz luz-1"></div>
        <div class="luz luz-2"></div>
    </div>
    
    <div id="ball-container"><div id="ball-cursor"></div></div>

    <div id="main-wrapper">
        <div id="screen-choice" class="card active">
            <img src="logo-app.png" alt="Logo" id="logo-app">
            <h2>Bienvenido a Drivery</h2>
            <button class="btn-choice" onclick="showScreen('screen-user')">Soy Usuario 👤</button>
            <button class="btn-choice" onclick="showScreen('screen-driver')">Soy Conductor 🚗</button>
        </div>

        <div id="screen-user" class="card">
            <h2>Descarga Drivery</h2>
            <p style="font-size: 14px; opacity: 0.8; margin-bottom: 20px;">Tu viaje comienza aquí.</p>
            
            <div class="store-button" onclick="finalizarUsuario('https://apl.bz/Mlv?l=es_US')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play">
            </div>

            <div class="store-button" onclick="finalizarUsuario('https://15147507-4.ondelight.app/')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="App Store">
            </div>

            <button class="btn-back" onclick="showScreen('screen-choice')">Volver</button>
        </div>

        <div id="screen-driver" class="card">
            <h2>Registro Conductor</h2>
            <form id="form-conductor">
                <input type="text" name="NombreCompleto" placeholder="Nombre completo" required>
                <input type="text" name="Cedula" placeholder="Cédula de Identidad" required>
                <input type="tel" name="Telefono" placeholder="Teléfono" required>
                <textarea name="Direccion" placeholder="Dirección corta" required style="width:100%; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:15px; height:70px; color:white; font-family:inherit; resize:none;"></textarea>
                
                <select name="Vehiculo" required>
                    <option value="" disabled selected>Tipo de vehículo</option>
                    <option value="Sedan">Carro Sedán</option>
                    <option value="SUV">Camioneta / SUV</option>
                    <option value="Moto">Motocicleta</option>
                </select>

                <p style="font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 15px;">
                    Verificaremos sus datos por WhatsApp.
                </p>
                <button type="submit" id="btn-envio" class="btn-primary">ENVIAR DATOS</button>
            </form>
            <button class="btn-back" onclick="showScreen('screen-choice')">Volver atrás</button>
        </div>

        <div id="mensaje-exito" class="card">
            <h2>¡A LAS GRANDES LIGAS!</h2>
            <p id="subtexto-exito">Cargando...</p>
        </div>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        const ballContainer = document.getElementById('ball-container');
        let posX = 100, posY = 100, velX = 2.5, velY = 2.5, isControlled = false;

        function animate() {
            if (!isControlled) {
                posX += velX; posY += velY;
                if (posX + 36 >= window.innerWidth || posX <= 0) velX *= -1;
                if (posY + 36 >= window.innerHeight || posY <= 0) velY *= -1;
                ballContainer.style.transform = `translate(${posX}px, ${posY}px)`;
            }
            requestAnimationFrame(animate);
        }
        animate();

        function mover(x, y) {
            isControlled = true;
            ballContainer.style.transform = `translate(${x - 18}px, ${y - 18}px)`;
        }
        document.addEventListener('mousemove', (e) => mover(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => mover(e.touches[0].clientX, e.touches[0].clientY), {passive:false});

        function finalizarUsuario(url) {
            document.getElementById('subtexto-exito').innerText = "Abriendo la tienda...";
            showScreen('mensaje-exito');
            setTimeout(() => { window.location.href = url; }, 2000);
        }

        const form = document.getElementById('form-conductor');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-envio');
            btn.innerText = "PROCESANDO..."; btn.disabled = true;
            const scriptURL = "https://script.google.com/macros/s/AKfycbzwXVJMJWLkQZ4iCEPRdMO2dtru57tk9EE0W-c_ZGTkilq73qEZHfgbgbq2g2_cf6EH/exec";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form), mode: 'no-cors' })
            .then(() => { 
                document.getElementById('subtexto-exito').innerText = "Te contactaremos pronto por WhatsApp.";
                showScreen('mensaje-exito'); 
            })
            .catch(() => { 
                document.getElementById('subtexto-exito').innerText = "Registro enviado.";
                showScreen('mensaje-exito'); 
            });
        });
    </script>
</body>
</html>
